          - heading "No cross-plugin imports. Ever." [level=3] [ref=e238]
          - paragraph [ref=e239]:
            - text: Plugins talk through the hook bus or they don't talk. Enforced by lint. The hook bus IS the inter-plugin API. If you find yourself wanting to
            - code [ref=e240]: import
            - text: from a sibling plugin, the hook surface is wrong, not the import.
      - generic [ref=e241]:
        - emphasis [ref=e243]: iii.
        - generic [ref=e244]:
          - heading "No half-wired plugins." [level=3] [ref=e245]
          - paragraph [ref=e246]: A plugin is either fully registered, fully tested, and reachable from the canary acceptance test — or it doesn't merge. "We'll wire this up later" is how you get a codebase full of code that looks done but isn't.
      - generic [ref=e247]:
        - emphasis [ref=e249]: iv.
        - generic [ref=e250]:
          - heading "One source of truth per concept." [level=3] [ref=e251]
          - paragraph [ref=e252]: If two plugins both store state about the same thing — skills, tools, sessions — one of them is wrong. Coordinate through service hooks, not shared rows. State sprawl is how teams end up reconciling reality at 3am.
      - generic [ref=e253]:
        - emphasis [ref=e255]: v.
