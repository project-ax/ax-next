          - heading "Capabilities are explicit and minimized." [level=3] [ref=e257]
          - paragraph [ref=e258]: Every plugin, tool, IPC handler, and sandbox boundary grants the smallest set of capabilities it needs. Untrusted content — model output, tool output, plugin code — stays untrusted at every hop. The whole point of v2 is that we're the secure one.
