function autogrow() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 180) + 'px';
  sendBtn.classList.toggle('ready', input.value.trim().length > 0);
}
input.addEventListener('input', autogrow);

input.addEventListener('keydown', (e) => {
  // Global-ish: /  enters search mode when field is empty
  if (searchMode) {
    if (e.key === 'Escape') { e.preventDefault(); exitSearch(); return; }
    if (e.key === 'Enter')  { e.preventDefault(); jumpToCurrentHit(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); stepHit(+1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); stepHit(-1); return; }
    return; // everything else is just typing the query
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submit();
  } else if (e.key === '/' && input.value === '') {
    e.preventDefault();
    enterSearch();
  }
});
sendBtn.addEventListener('click', () => {
  if (searchMode) exitSearch();
  else submit();
});

// Global ⌘K / Ctrl+K to toggle search
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    if (searchMode) exitSearch();
    else enterSearch();
  }
});

input.addEventListener('input', () => {
  if (searchMode) runSearch(input.value);
});

/* =========================================================
   Search
   ========================================================= */
let searchMode = false;
let hits = [];         // array of {msgId, el}
let currentHit = -1;
let semanticTimer = null;

const searchStatus = document.getElementById('searchStatus');
const searchStatusText = document.getElementById('searchStatusText');
const searchStatusPill = document.getElementById('searchStatusPill');
const iconSend = document.querySelector('.icon-send');
const iconClear = document.querySelector('.icon-clear');
const hintEl = document.getElementById('composerHint');
const HINT_NORMAL = '<kbd>⏎</kbd> send · <kbd>⇧⏎</kbd> newline · <kbd>/</kbd> or <kbd>⌘K</kbd> find';
const HINT_SEARCH = '<kbd>↑</kbd><kbd>↓</kbd> step · <kbd>⏎</kbd> jump · <kbd>esc</kbd> exit';

function enterSearch() {
  searchMode = true;
  document.body.classList.add('searching');
  input.placeholder = 'Find in chat…';
  input.value = '';
  iconSend.style.display = 'none';
  iconClear.style.display = '';
  hintEl.innerHTML = HINT_SEARCH;
  searchStatus.style.display = '';
  runSearch('');
  input.focus();
}

function exitSearch() {
  searchMode = false;
  document.body.classList.remove('searching');
  input.placeholder = 'Message Tide…';
  input.value = '';
  iconSend.style.display = '';
  iconClear.style.display = 'none';
  hintEl.innerHTML = HINT_NORMAL;
  clearTimeout(semanticTimer);
  // Restore timeline
  render();
  autogrow();
  input.focus();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const re = new RegExp(escapeRe(q), 'gi');
  let out = '';
  let last = 0;
  const safe = escapeHtml(text);
  // Re-run regex on safe text (escapeHtml doesn't touch letters/numbers,
  // so ranges map 1:1 for alphanumeric queries; good enough for this).
  safe.replace(re, (m, idx) => {
    out += safe.slice(last, idx) + '<mark class="hit">' + m + '</mark>';
    last = idx + m.length;
    return m;
  });
  out += safe.slice(last);
  return out;
}

function runSearch(query) {
  clearTimeout(semanticTimer);
  const q = query.trim();

  // Re-render timeline fresh (clears any prior highlight/current-hit state)
  render();

  if (!q) {
    // Empty query: show everything, no hits
    hits = [];
    currentHit = -1;
    searchStatusText.innerHTML = '<strong>type</strong> to find · or ask in plain english';
    searchStatusPill.classList.remove('semantic');
    return;
  }

  // Literal substring pass
  const qLower = q.toLowerCase();
  hits = [];
  const allMsgs = [...document.querySelectorAll('.msg')];
  allMsgs.forEach(el => {
    const m = messages.find(x => x.id === el.dataset.id);
    if (!m) return;
    if (m.text.toLowerCase().includes(qLower)) {
      // Highlight matches in body
      const body = el.querySelector('.msg-body');
      body.innerHTML = highlight(m.text, q);
      hits.push({ msgId: m.id, el });
    } else {
      el.classList.add('miss');
    }
  });

  if (hits.length > 0) {
    currentHit = 0;
    markCurrentHit();
    searchStatusText.innerHTML = `<strong>${hits.length}</strong> ${hits.length === 1 ? 'result' : 'results'}`;
    searchStatusPill.classList.remove('semantic');
  } else {
    currentHit = -1;
    // Show empty state + offer semantic
    const empty = document.createElement('div');
    empty.className = 'search-empty';
    empty.innerHTML = `
      <div class="big">no literal match for "${escapeHtml(q)}"</div>
      <div>looking semantically…</div>
    `;
    // Clear timeline and show empty
    timeline.innerHTML = '';
    timeline.appendChild(empty);
    searchStatusText.innerHTML = `<span class="search-thinking"></span> thinking…`;
    searchStatusPill.classList.add('semantic');
    // Auto-fire semantic after a short debounce
    semanticTimer = setTimeout(() => runSemanticSearch(q), 400);
  }
}

function markCurrentHit() {
  document.querySelectorAll('.msg.current-hit').forEach(el => el.classList.remove('current-hit'));
  if (currentHit < 0 || currentHit >= hits.length) return;
  const h = hits[currentHit];
  h.el.classList.add('current-hit');
  { const r = h.el.getBoundingClientRect(); window.scrollTo({ top: window.scrollY + r.top - window.innerHeight/2 + r.height/2, behavior: 'smooth' }); }
  searchStatusText.innerHTML = `<strong>${currentHit + 1}</strong> of ${hits.length}`;
}

function stepHit(delta) {
  if (hits.length === 0) return;
  currentHit = (currentHit + delta + hits.length) % hits.length;
  markCurrentHit();
}

function jumpToCurrentHit() {
  if (currentHit < 0 || currentHit >= hits.length) return;
  const h = hits[currentHit];
  exitSearch();
  // After exit + re-render, find the message again and flash it
  requestAnimationFrame(() => {
    const el = document.querySelector(`.msg[data-id="${h.msgId}"]`);
    if (!el) return;
    { const r = el.getBoundingClientRect(); window.scrollTo({ top: window.scrollY + r.top - window.innerHeight/2 + r.height/2, behavior: 'smooth' }); }
    el.classList.add('current-hit');
    setTimeout(() => el.classList.remove('current-hit'), 1400);
  });
}

document.getElementById('searchPrev').addEventListener('click', () => stepHit(-1));
document.getElementById('searchNext').addEventListener('click', () => stepHit(+1));
document.getElementById('searchExit').addEventListener('click', exitSearch);

/* Semantic fallback — ask Claude to pick relevant message IDs */
async function runSemanticSearch(q) {
  if (!searchMode) return;
  if (!(window.claude && typeof window.claude.complete === 'function')) {
    renderSemanticEmpty(q);
    return;
  }
  // Build a compact index
  const index = messages.filter(m => m.type !== 'break').slice(-200).map(m => ({
    id: m.id,
    role: m.role,
    text: m.text.length > 220 ? m.text.slice(0, 220) + '…' : m.text,
  }));
  const system =
    "you help find messages in a chat log by semantic relevance. " +
    "given a query and a list of messages (id + text), return ONLY a JSON array of the message ids that best match the query, most relevant first, up to 10. " +
    "if nothing matches well, return []. no prose, no explanation, just the JSON array.";
  const userMsg =
    `query: ${q}\n\nmessages:\n` +
    index.map(m => `${m.id} [${m.role}]: ${m.text}`).join('\n');
  let ids = [];
  try {
    const out = await window.claude.complete({
      system,
      messages: [{ role: 'user', content: userMsg }],
    });
    const match = out && out.match(/\[[\s\S]*\]/);
    if (match) ids = JSON.parse(match[0]);
  } catch (err) {
    console.warn('semantic search failed', err);
  }
  if (!searchMode) return; // user exited while we were thinking

  if (!Array.isArray(ids) || ids.length === 0) {
    renderSemanticEmpty(q);
    return;
  }

  // Render only matching messages, in the order Claude returned
  timeline.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'day';
  label.textContent = 'related to your question';
  timeline.appendChild(label);
  hits = [];
  ids.forEach(id => {
    const m = messages.find(x => x.id === id);
    if (!m) return;
    const el = buildMsg(m, false);
    timeline.appendChild(el);
    hits.push({ msgId: id, el });
  });
  if (hits.length > 0) {
    currentHit = 0;
    markCurrentHit();
    searchStatusText.innerHTML = `<strong>${hits.length}</strong> related · semantic`;
  } else {
    renderSemanticEmpty(q);
  }
}

function renderSemanticEmpty(q) {
  timeline.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'search-empty';
  empty.innerHTML = `
    <div class="big">nothing matched "${escapeHtml(q)}"</div>
    <div>try different words, or exit and ask tide directly</div>
  `;
  timeline.appendChild(empty);
  searchStatusText.innerHTML = `<strong>0</strong> results`;
  searchStatusPill.classList.remove('semantic');
}

async function submit() {
  const text = input.value.trim();
  if (!text) return;
  // If we're in a pending-agent state (user switched agents from a session
  // with messages but hasn't typed yet), materialize a new session under
  // the pending agent before pushing the first message.
  if (pendingAgentId) {
    const id = pendingAgentId;
    pendingAgentId = null;
    // newSession() reads localStorage AGENT_KEY for intendedAgentId, which
    // setActiveAgent already wrote when the user picked the agent. Safe.
    newSession();
    // Belt-and-suspenders: ensure the new session is stamped with `id`.
    const ns = currentSession();
    if (ns) ns.agentId = id;
  }
  const userMsg = {
    id: 'u' + Date.now(),
    role: 'you',
    text,
    ts: Date.now(),
  };
  messages.push(userMsg);
  save();
  input.value = '';
  autogrow();

  appendRendered(userMsg);
  scrollToEnd();

  await runAgentTurn(text);
}

/* Run one agent turn for an already-pushed user prompt.
   Plans tools, creates the agent message, animates tools, calls the model,
   updates the rendered DOM. Used by submit(), retry, and edit-commit. */
async function runAgentTurn(text) {
  const plannedTools = planTools(text);
  const agentMsg = {
    id: 'a' + Date.now(),
    role: 'agent',
    text: '',
    ts: Date.now(),
    tools: plannedTools.length ? plannedTools.map(g => ({
      title: g.title,
      tools: g.tools.map(t => ({ name: t.name, args: t.args, result: t.result, status: 'running' })),
    })) : undefined,
  };

  let thinking = null;
  if (plannedTools.length) {
    messages.push(agentMsg);
    appendRendered(agentMsg);
    scrollToEnd();
    await runPlannedTools(agentMsg);
  } else {
    thinking = document.createElement('div');
    thinking.className = 'thinking';
    timeline.appendChild(thinking);
    scrollToEnd();
  }

  let reply;
  try {
    reply = await callAgent(text, plannedTools);
  } catch(_) {
    reply = 'sorry — i had trouble with that. say more?';
  }

  if (thinking) thinking.remove();

  if (plannedTools.length) {
    agentMsg.text = reply;
    agentMsg.ts = Date.now();
    save();
    const el = timeline.querySelector(`.msg[data-id="${agentMsg.id}"]`);
    if (el) {
      const body = el.querySelector('.msg-body');
      if (body) body.textContent = reply;
      const time = el.querySelector('.msg-time');
      if (time) time.textContent = timeLabel(agentMsg.ts);
    }
    scrollToEnd();
  } else {
    agentMsg.text = reply;
    messages.push(agentMsg);
    save();
    appendRendered(agentMsg);
    scrollToEnd();
  }
}

/* =========================================================
   Tool-call planning & simulation
   ========================================================= */
// Pattern-match the prompt to decide which tools the agent would call.
// Purely heuristic — no real tool execution; results are plausible fakes.
function planTools(text) {
  const t = text.toLowerCase();
  const tools = [];
  let title = null;

  if (/\b(calendar|schedule|meeting|today|tomorrow|this week|cal\b)/.test(t)) {
    tools.push({ name: 'calendar.read', args: { range: /tomorrow/.test(t) ? 'tomorrow' : /week/.test(t) ? 'this week' : 'today', cal: 'primary' }, result: '3 events' });
  }
  if (/\b(email|inbox|message from|reply from|mercy|legal)/.test(t)) {
    tools.push({ name: 'email.search', args: { since: '24h', query: text.slice(0, 40) }, result: '2 threads' });
    if (/\b(reply|read|details|what did|what does)/.test(t)) {
      tools.push({ name: 'email.read', args: { thread: 'top result' }, result: 'opened' });
    }
  }
  if (/\b(slack|dm from|ping|channel)/.test(t)) {
    tools.push({ name: 'slack.search', args: { query: text.slice(0, 40), since: '24h' }, result: '4 messages' });
  }
  if (/\b(deck|slides?|keynote|presentation|doc|document|brochure|draft|file)/.test(t)) {
    tools.push({ name: 'drive.find', args: { query: text.slice(0, 40) }, result: '1 file' });
    if (/\b(read|review|check|look at|fix|edit)/.test(t)) {
      tools.push({ name: 'drive.read', args: { file: 'top result' }, result: 'opened' });
    }
  }
  if (/\b(flight|book|flights|travel|tokyo|london|paris|tickets|hotel)/.test(t)) {
    tools.push({ name: 'flights.search', args: { query: text.slice(0, 40) }, result: '12 options' });
  }
  if (/\b(linear|ticket|issue|bug|incident|INC-|jira)/i.test(text)) {
    tools.push({ name: 'linear.search', args: { query: text.slice(0, 40) }, result: '3 tickets' });
  }
  if (/\b(search|look up|find|news|latest|who is|what is|when did)/.test(t) && tools.length === 0) {
    tools.push({ name: 'web.search', args: { q: text.slice(0, 60) }, result: '5 results' });
  }

  if (!tools.length) return [];
  const capped = tools.slice(0, 3);
  // Wrap into a single anonymous group; the renderer derives the
  // "Searched the web, read the file" header from the steps' verbs.
  return [{ tools: capped }];
}

// Walk every step inside every group and resolve them sequentially.
async function runPlannedTools(agentMsg) {
  if (!agentMsg.tools) return;
  const el = timeline.querySelector(`.msg[data-id="${agentMsg.id}"]`);
  const groups = agentMsg.tools;
  // If they're not grouped (legacy callers), normalize on the fly.
  const flat = [];
  groups.forEach(g => {
    if (g && Array.isArray(g.tools)) g.tools.forEach(t => flat.push(t));
    else flat.push(g);
  });
  for (let i = 0; i < flat.length; i++) {
    await new Promise(r => setTimeout(r, 420 + Math.random() * 480));
    flat[i].status = 'done';
    if (el) {
      const oldTools = el.querySelector('.msg-tools');
      const newTools = buildTools(agentMsg.tools);
      if (oldTools) oldTools.replaceWith(newTools);
      else el.insertBefore(newTools, el.firstChild);
    }
  }
}

function appendRendered(m) {
  // If this is the first message of a new day, inject a day marker
  const lastChild = timeline.lastElementChild;
  let needsDay = true;
  if (lastChild) {
    // Walk back to find the previous message ts
    for (let i = messages.length - 2; i >= 0; i--) {
      if (dayOf(messages[i].ts) === dayOf(m.ts)) { needsDay = false; break; }
      break;
    }
  } else {
    needsDay = true;
  }
  // Simpler: re-render if things get weird. For incremental adds,
  // just append; day markers at boundaries are rare mid-session.
  const el = buildMsg(m);
  el.classList.add('entering');
  timeline.appendChild(el);
  el.addEventListener('animationend', () => el.classList.remove('entering'), { once: true });
}

function scrollToEnd() {
  requestAnimationFrame(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  });
}

/* =========================================================
   Agent call
   ========================================================= */
async function callAgent(text, plannedTools) {
  const system =
    "you are tide — a calm, concise thinking partner in an ongoing one-on-one chat. " +
    "you reply in lowercase-ish prose, 1 to 3 short sentences, no headers, no bullet lists unless asked. " +
    "you have persistent context: you remember what the user has told you in this conversation. " +
    "never introduce yourself again. never announce 'as an AI'. talk like a trusted colleague. " +
    (plannedTools && plannedTools.length
      ? "you just ran these tools and got results — weave the outcomes into your reply naturally, don't mention 'tools' or 'i searched': "
        + plannedTools.flatMap(g => Array.isArray(g.tools) ? g.tools : [g])
            .map(t => `${t.name}(${JSON.stringify(t.args)}) → ${t.result}`).join('; ')
      : "");

  // Recent context window: just take the last N messages of this session.
  const history = messages.slice(-14).map(m => ({
    role: m.role === 'you' ? 'user' : 'assistant',
    content: m.text,
  }));
  if (window.claude && typeof window.claude.complete === 'function') {
    try {
      const out = await window.claude.complete({ system, messages: history });
      if (out && typeof out === 'string') return out.trim();
    } catch (err) {
      console.warn('claude failed, falling back', err);
    }
  }
  // Fallback — just a calm, generic acknowledgement
  await new Promise(r => setTimeout(r, 700));
  if (/\?/.test(text)) return 'good question. let me sit with it a moment and get back with something concrete.';
  if (/^(thanks|thank you|ty)/i.test(text.trim())) return 'anytime.';
  return 'noted. want me to move on that now, or hold it for your morning review?';
}

/* =========================================================
   TIDE LINE — calendar ruler, browse by date
   ========================================================= */
const tideLine = document.getElementById('tideLine');
const tideTrack = document.getElementById('tideTrack');
const tideCursor = document.getElementById('tideCursor');
const tideChip = document.getElementById('tideChip');
const tideChipDate = document.getElementById('tideChipDate');
const tideChipCount = document.getElementById('tideChipCount');
const tideChipSummary = document.getElementById('tideChipSummary');

const summaryCache = new Map();
let tideDays = []; // [{dateKey, date, ts, count, el}]

function buildTideLine() {
  // Clear
  [...tideTrack.querySelectorAll('.tide-day, .tide-label')].forEach(e => e.remove());

  // Group messages by day
  const byDay = new Map();
  messages.forEach(m => {
    const k = new Date(m.ts);
    k.setHours(0, 0, 0, 0);
    const key = k.getTime();
    if (!byDay.has(key)) byDay.set(key, []);
    byDay.get(key).push(m);
  });

  if (byDay.size === 0) return;

  const keys = [...byDay.keys()].sort((a, b) => a - b);
  const firstDay = keys[0];
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const lastDay = Math.max(keys[keys.length - 1], today.getTime());
  const spanDays = Math.max(1, Math.round((lastDay - firstDay) / (24 * 3600 * 1000)));

  tideDays = [];
  const todayKey = today.getTime();

  // Show a tick for each day in span (even empty ones, but only if we have few days);
  // for bigger spans, only show days that have activity + month anchors
  const showAllDays = spanDays <= 60;

  for (let i = 0; i <= spanDays; i++) {
    const ts = firstDay + i * 24 * 3600 * 1000;
    const has = byDay.has(ts);
    if (!showAllDays && !has && ts !== todayKey) continue;
    const count = has ? byDay.get(ts).length : 0;
    const pct = (i / spanDays) * 100;
    const d = new Date(ts);

    const el = document.createElement('div');
    el.className = 'tide-day';
    const tier = count === 0 ? 0 : count <= 2 ? 1 : count <= 5 ? 2 : 3;
    if (count > 0) el.classList.add('d' + tier);
    else el.classList.add('d0');
    if (ts === todayKey) el.classList.add('today');
    el.style.top = `calc(${pct}% - 1px)`;
    el.style.height = showAllDays ? '3px' : '4px';
    tideTrack.appendChild(el);

    tideDays.push({ ts, count, el, pct, messages: byDay.get(ts) || [] });

    // Anchor labels: first of month
    if (d.getDate() === 1 || i === 0) {
      const lab = document.createElement('div');
      lab.className = 'tide-label anchor';
      lab.style.top = `${pct}%`;
      lab.textContent = d.toLocaleDateString(undefined, { month: 'short' });
      tideTrack.appendChild(lab);
    }
  }
}
buildTideLine();

let hoverLabel = null;
function ensureHoverLabel() {
  if (!hoverLabel) {
    hoverLabel = document.createElement('div');
    hoverLabel.className = 'tide-label';
    tideTrack.appendChild(hoverLabel);
  }
  return hoverLabel;
}

function onTideMove(clientY) {
  const rect = tideTrack.getBoundingClientRect();
  const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
  const pct = y / rect.height;
  tideCursor.style.top = `${pct * 100}%`;

  // Find nearest day
  if (tideDays.length === 0) return null;
  let nearest = tideDays[0];
  let bestDist = Infinity;
  for (const d of tideDays) {
    const dist = Math.abs(d.pct / 100 - pct);
    if (dist < bestDist) { bestDist = dist; nearest = d; }
  }

  // Update chip
  const date = new Date(nearest.ts);
  tideChipDate.textContent = dayLabel(nearest.ts);
  tideChipCount.textContent = nearest.count === 0
    ? 'quiet · no messages'
    : `${nearest.count} ${nearest.count === 1 ? 'message' : 'messages'}`;

  // Position chip next to cursor
  tideChip.style.top = `${clientY}px`;
  tideChip.classList.add('visible');

  // Hover label showing the nearest date
  const lab = ensureHoverLabel();
  lab.textContent = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  lab.style.top = `${nearest.pct}%`;
  lab.style.opacity = '0.9';

  // Summary
  if (nearest.count > 0) {
    renderSummary(nearest);
  } else {
    tideChipSummary.textContent = '';
    tideChipSummary.classList.remove('loading');
  }
  return nearest;
}

let summaryTimer = null;
function renderSummary(day) {
  const key = day.ts;
  if (summaryCache.has(key)) {
    tideChipSummary.textContent = summaryCache.get(key);
    tideChipSummary.classList.remove('loading');
    return;
  }
  tideChipSummary.textContent = '';
  tideChipSummary.classList.add('loading');
  clearTimeout(summaryTimer);
  summaryTimer = setTimeout(() => fetchDaySummary(day), 300);
}

async function fetchDaySummary(day) {
  const key = day.ts;
  // Local fallback: join first-line snippets
  const quick = day.messages
    .slice(0, 3)
    .map(m => (m.text.split('\n')[0] || '').slice(0, 60))
    .join(' · ');

  if (!(window.claude && typeof window.claude.complete === 'function')) {
    summaryCache.set(key, quick || '…');
    if (tideChip.classList.contains('visible')) {
      tideChipSummary.textContent = summaryCache.get(key);
      tideChipSummary.classList.remove('loading');
    }
    return;
  }

  const system = 'summarize the following chat messages from a single day in ONE very short phrase, 4-9 words, lowercase, no quotes, no punctuation at the end. it should read like a diary entry topic, not a sentence.';
  const user = day.messages.map(m => `[${m.role}] ${m.text.slice(0, 240)}`).join('\n');
  let out = '';
  try {
    const reply = await window.claude.complete({ system, messages: [{ role: 'user', content: user }] });
    if (reply && typeof reply === 'string') out = reply.trim().replace(/^["'\u201c\u2018]|["'\u201d\u2019]$/g, '').slice(0, 80);
  } catch(_) {}
  if (!out) out = quick;
  summaryCache.set(key, out);
  // Only update if this day is still the hovered one
  if (tideChip.classList.contains('visible') && tideChipDate.textContent === dayLabel(day.ts)) {
    tideChipSummary.textContent = out;
    tideChipSummary.classList.remove('loading');
  }
}

tideLine.addEventListener('mousemove', (e) => onTideMove(e.clientY));
tideLine.addEventListener('mouseleave', () => {
  tideChip.classList.remove('visible');
  if (hoverLabel) hoverLabel.style.opacity = '0';
});
tideLine.addEventListener('click', (e) => {
  const day = onTideMove(e.clientY);
  if (!day) return;
  // Jump to first message of that day (or nearest if empty)
  jumpToDay(day.ts);
});

/* Touch handling for tide-line: tap or drag to scrub; release jumps.
   We use touchstart/move to preview (like hover) and touchend to commit. */
let tideTouchActive = false;
tideLine.addEventListener('touchstart', (e) => {
  tideTouchActive = true;
  tideLine.classList.add('pinned');
  if (e.touches[0]) onTideMove(e.touches[0].clientY);
}, { passive: true });
tideLine.addEventListener('touchmove', (e) => {
  if (!tideTouchActive) return;
  if (e.touches[0]) onTideMove(e.touches[0].clientY);
}, { passive: true });
tideLine.addEventListener('touchend', (e) => {
  tideTouchActive = false;
  const touch = e.changedTouches[0];
  if (touch) {
    const day = onTideMove(touch.clientY);
    if (day) jumpToDay(day.ts);
  }
  // Small delay so the user sees where they jumped to
  setTimeout(() => {
    tideLine.classList.remove('pinned');
    tideChip.classList.remove('visible');
    if (hoverLabel) hoverLabel.style.opacity = '0';
  }, 600);
});

function jumpToDay(ts) {
  // Find the first message >= ts
  const target = messages.find(m => {
    const d = new Date(m.ts); d.setHours(0,0,0,0);
    return d.getTime() >= ts;
  });
  if (!target) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const el = document.querySelector(`.msg[data-id="${target.id}"]`);
  if (!el) return;
  const r = el.getBoundingClientRect();
  const tlRect = document.querySelector('.timeline').getBoundingClientRect();
  window.scrollTo({ top: window.scrollY + r.top - 80, behavior: 'smooth' });
  el.classList.add('current-hit');
  setTimeout(() => el.classList.remove('current-hit'), 1200);
}

/* =========================================================
   SESSIONS — sidebar rendering, switching, creating
   ========================================================= */
const sessionsListEl = document.getElementById('sessionsList');
const newSessionBtn = document.getElementById('newSessionBtn');
const sidebarEl = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebarToggle');
const sessionHeaderTitleEl = document.getElementById('sessionHeaderTitle');
const sessionHeaderMetaEl = document.getElementById('sessionHeaderMeta');

function sessionLastTs(s) {
  if (!s.messages.length) return Date.now(); // empty / new session → sort to top, group as today
  return s.messages[s.messages.length - 1].ts;
}

function sessionRelativeTime(ts) {
  if (!ts) return 'empty';
  const now = Date.now();
  const diff = now - ts;
  const M = 60 * 1000, H = 60 * M, D = 24 * H;
  if (diff < 2 * M) return 'just now';
  if (diff < H) return Math.floor(diff / M) + 'm';
  if (diff < D) return Math.floor(diff / H) + 'h';
  if (diff < 7 * D) return Math.floor(diff / D) + 'd';
  const d = new Date(ts);
  const mo = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][d.getMonth()];
  return mo + ' ' + d.getDate();
}

function sessionGroup(ts) {
  if (!ts) return 'earlier';
  const now = new Date();
  const d = new Date(ts);
  const days = Math.floor((now.setHours(0,0,0,0) - new Date(d).setHours(0,0,0,0)) / (24*3600*1000));
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return 'this week';
  if (days < 30) return 'this month';
  return 'earlier';
}

function sessionPreview(s) {
  if (!s.messages.length) return '';
  const last = s.messages.filter(m => m.type !== 'break').slice(-1)[0];
  if (!last) return '';
  return last.text.split('\n')[0].slice(0, 70);
}

function renderSessions() {
  if (!sessionsListEl) return;
  // Sort sessions by most recent activity
  const sorted = [...store.sessions].sort((a, b) => sessionLastTs(b) - sessionLastTs(a));

  // Group
  const groupOrder = ['today','yesterday','this week','this month','earlier'];
  const groups = {};
  sorted.forEach(s => {
    const g = sessionGroup(sessionLastTs(s));
    (groups[g] ||= []).push(s);
  });

  sessionsListEl.innerHTML = '';
  groupOrder.forEach(g => {
    if (!groups[g]) return;
    const label = document.createElement('div');
    label.className = 'sessions-group-label';
    label.textContent = g;
    sessionsListEl.appendChild(label);
    groups[g].forEach(s => {
      const btn = document.createElement('div');
      btn.className = 'session-item';
      if (s.id === store.activeId) btn.classList.add('active');
      btn.dataset.id = s.id;
      const agent = getAgentById(s.agentId || 'tide');
      btn.innerHTML = `
        <span class="session-agent-dot" style="background:${agent.color}" title="${agent.name}"></span>
        <div class="session-title" data-role="title">${escapeHtml(s.title)}</div>
        <button class="session-more" data-role="more" aria-label="Session actions" title="More…">
          <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="3" cy="7" r="1.1" fill="currentColor"/>
            <circle cx="7" cy="7" r="1.1" fill="currentColor"/>
            <circle cx="11" cy="7" r="1.1" fill="currentColor"/>
          </svg>
        </button>
        <div class="session-row-menu" data-role="row-menu" hidden>
          <button class="session-row-menu-item" data-action="rename">
            <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M2 12 L4 12 L11 5 L9 3 L2 10 Z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>
            <span>Rename</span>
          </button>
          <button class="session-row-menu-item danger" data-action="delete">
            <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 4 L11 4 M5 4 L5 2 L9 2 L9 4 M4.5 4 L5 12 L9 12 L9.5 4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
            <span>Delete</span>
          </button>
        </div>
      `;
      // Click row → switch session (but not when clicking title in edit mode, ⋯, or its menu)
      btn.addEventListener('click', (e) => {
        if (e.target.closest('[data-role="more"]')) return;
        if (e.target.closest('[data-role="row-menu"]')) return;
        if (e.target.closest('[data-role="title"][contenteditable="true"]')) return;
        if (btn.classList.contains('confirming-delete')) return;
        switchSession(s.id);
      });
      // ⋯ toggles row menu
      btn.querySelector('[data-role="more"]').addEventListener('click', (e) => {
        e.stopPropagation();
        const m = btn.querySelector('[data-role="row-menu"]');
        // Close any other open row menus first
        document.querySelectorAll('.session-item .session-row-menu').forEach(other => {
          if (other !== m) other.hidden = true;
        });
        m.hidden = !m.hidden;
      });
      // Rename
      btn.querySelector('[data-action="rename"]').addEventListener('click', (e) => {
        e.stopPropagation();
        btn.querySelector('[data-role="row-menu"]').hidden = true;
        startRename(btn, s);
      });
      // Delete (with inline confirm)
      btn.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
        e.stopPropagation();
        btn.querySelector('[data-role="row-menu"]').hidden = true;
        startDeleteConfirm(btn, s);
      });
      // Double-click title → rename
      btn.querySelector('[data-role="title"]').addEventListener('dblclick', (e) => {
        e.stopPropagation();
        startRename(btn, s);
      });
      sessionsListEl.appendChild(btn);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function updateSessionHeader() {
  const s = currentSession();
  if (!s || !sessionHeaderTitleEl) return;
  sessionHeaderTitleEl.textContent = s.title;
  if (sessionHeaderMetaEl) {
    const count = s.messages.filter(m => m.type !== 'break').length;
    const last = sessionLastTs(s);
    sessionHeaderMetaEl.textContent = count
      ? `${count} message${count === 1 ? '' : 's'} · last ${sessionRelativeTime(last)}`
      : 'empty';
  }
  // Reflect the session's agent in the header chip (without clobbering global pref).
  if (typeof renderAgentChip === 'function') renderAgentChip();
}

// Click the header session title to rename inline.
function startHeaderRename() {
  const s = currentSession();
  if (!s || !sessionHeaderTitleEl) return;
  if (sessionHeaderTitleEl.classList.contains('editing')) return;
  const el = sessionHeaderTitleEl;
  el.setAttribute('contenteditable', 'plaintext-only');
  el.classList.add('editing');
  // Select all
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  el.focus();
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const newTitle = el.textContent.trim().slice(0, 80);
    el.removeAttribute('contenteditable');
    el.classList.remove('editing');
    if (newTitle && newTitle !== s.title) {
      s.title = newTitle;
      s.titleLocked = true;
      save();
      renderSessions();
      updateSessionHeader();
    } else {
      el.textContent = s.title;
    }
  };
  const cancel = () => {
    if (committed) return;
    committed = true;
    el.removeAttribute('contenteditable');
    el.classList.remove('editing');
    el.textContent = s.title;
  };
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); el.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); el.blur(); }
  });
  el.addEventListener('blur', commit, { once: true });
}
if (sessionHeaderTitleEl) {
  sessionHeaderTitleEl.addEventListener('click', () => {
    if (!sessionHeaderTitleEl.classList.contains('editing')) startHeaderRename();
  });
  sessionHeaderTitleEl.title = 'Click to rename';
}

function startRename(rowEl, s) {
  const titleEl = rowEl.querySelector('[data-role="title"]');
  if (!titleEl) return;
  titleEl.setAttribute('contenteditable', 'plaintext-only');
  titleEl.classList.add('editing');
  // Select all
  const range = document.createRange();
  range.selectNodeContents(titleEl);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  titleEl.focus();
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const newTitle = titleEl.textContent.trim().slice(0, 80);
    titleEl.removeAttribute('contenteditable');
    titleEl.classList.remove('editing');
    if (newTitle && newTitle !== s.title) {
      s.title = newTitle;
      // Mark as user-renamed so the auto-titler doesn't clobber it.
      s.titleLocked = true;
      save();
      renderSessions();
      updateSessionHeader();
    } else {
      // Restore original (in case they edited and deleted)
      titleEl.textContent = s.title;
    }
  };
  const cancel = () => {
    if (committed) return;
    committed = true;
    titleEl.removeAttribute('contenteditable');
    titleEl.classList.remove('editing');
    titleEl.textContent = s.title;
  };
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); titleEl.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); titleEl.blur(); }
  });
  titleEl.addEventListener('blur', commit, { once: true });
}

function startDeleteConfirm(rowEl, s) {
  // Replace row contents with a confirm UI; auto-revert after 5s if no action.
  if (rowEl.classList.contains('confirming-delete')) return;
  rowEl.classList.add('confirming-delete');
  const original = rowEl.innerHTML;
  rowEl.innerHTML = `
    <span class="confirm-text">delete this session?</span>
    <button class="confirm-btn cancel" data-act="cancel">cancel</button>
    <button class="confirm-btn danger" data-act="delete">delete</button>
  `;
  let timer = setTimeout(revert, 5000);
  function revert() {
    clearTimeout(timer);
    rowEl.classList.remove('confirming-delete');
    // Re-render whole sidebar to reattach handlers cleanly.
    renderSessions();
  }
  rowEl.querySelector('[data-act="cancel"]').addEventListener('click', (e) => {
    e.stopPropagation();
    revert();
  });
  rowEl.querySelector('[data-act="delete"]').addEventListener('click', (e) => {
    e.stopPropagation();
    clearTimeout(timer);
    deleteSession(s.id);
  });
}

function deleteSession(id) {
  const idx = store.sessions.findIndex(x => x.id === id);
  if (idx < 0) return;
  const wasActive = store.activeId === id;
  store.sessions.splice(idx, 1);
  if (wasActive) {
    if (store.sessions.length) {
      // Switch to the session that took its slot, or the previous one.
      const next = store.sessions[idx] || store.sessions[idx - 1] || store.sessions[0];
      store.activeId = next.id;
      messages = next.messages;
    } else {
      // No sessions left — create a fresh one.
      newSession();
      return;
    }
  }
  save();
  render();
}

function switchSession(id) {
  const s = store.sessions.find(x => x.id === id);
  if (!s) return;
  store.activeId = id;
  messages = s.messages;
  pendingAgentId = null;
  // Close mobile sidebar after selecting
  document.body.classList.remove('sidebar-open');
  save();
  render();
  window.scrollTo({ top: document.body.scrollHeight });
}

function newSession() {
  const id = 'sess-' + Date.now().toString(36);
  // Stamp the user's *intended* agent (from global pref), not the current session's agent.
  const intendedAgentId = localStorage.getItem(AGENT_KEY) || getActiveAgent().id;
  const s = { id, title: 'new session', messages: [], agentId: intendedAgentId };
  store.sessions.unshift(s);
  store.activeId = id;
  messages = s.messages;
  pendingAgentId = null;
  document.body.classList.remove('sidebar-open');
  save();
  render();
  // Focus composer
  const input = document.getElementById('composerInput');
  if (input) input.focus();
}

if (newSessionBtn) newSessionBtn.addEventListener('click', newSession);
if (sidebarToggle) {
  sidebarToggle.addEventListener('click', () => {
    document.body.classList.toggle('sidebar-open');
  });
}

/* =========================================================
   Sidebar collapse (desktop) — persists in localStorage
   ========================================================= */
const COLLAPSE_KEY = 'tide-sidebar-collapsed';
function applyCollapsed() {
  const collapsed = localStorage.getItem(COLLAPSE_KEY) === '1';
  document.body.classList.toggle('sidebar-collapsed', collapsed);
  const btn = document.getElementById('sidebarCollapse');
  if (btn) btn.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
}
applyCollapsed();
const collapseBtn = document.getElementById('sidebarCollapse');
if (collapseBtn) {
  collapseBtn.addEventListener('click', () => {
    const cur = localStorage.getItem(COLLAPSE_KEY) === '1';
    localStorage.setItem(COLLAPSE_KEY, cur ? '0' : '1');
    applyCollapsed();
    closeAllMenus();
  });
}

/* =========================================================
   Agent selector (top of sidebar) + User menu (bottom)
   ========================================================= */
const AGENTS = [
  { id: 'tide',   name: 'tide',    tag: 'work',     desc: 'your default work agent',          color: '#7aa6c9' },
  { id: 'mercy',  name: 'mercy',   tag: 'legal',    desc: 'contracts, vendors, compliance',   color: '#b08968' },
  { id: 'compass',name: 'compass', tag: 'research', desc: 'long-form research & synthesis',   color: '#8a7fb3' },
  { id: 'orbit',  name: 'orbit',   tag: 'personal', desc: 'travel, errands, calendar',        color: '#7fb39f' },
];
const AGENT_KEY = 'tide-active-agent';

function getActiveAgent() {
  // Active agent is the pending agent (during a pending switch), then the
  // current session's agent, falling back to a global pref.
  if (pendingAgentId) {
    return AGENTS.find(a => a.id === pendingAgentId) || AGENTS[0];
  }
  const s = currentSession();
  const id = (s && s.agentId) || localStorage.getItem(AGENT_KEY) || 'tide';
  return AGENTS.find(a => a.id === id) || AGENTS[0];
}
function setActiveAgent(id) {
  // Stash as the global default for new sessions started via "+ new session".
  localStorage.setItem(AGENT_KEY, id);
  renderAgentChip();
  renderAgentMenu();
}
function getAgentById(id) {
  return AGENTS.find(a => a.id === id) || AGENTS[0];
}
function renderAgentChip() {
  const a = getActiveAgent();
  const nameEl = document.getElementById('agentChipName');
  if (nameEl) nameEl.textContent = a.name;
  const dot = document.querySelector('#agentChip .agent-chip-avatar .dot');
  if (dot) dot.style.background = a.color;
}
function renderAgentMenu() {
  const rows = document.getElementById('agentMenuRows');
  if (!rows) return;
  const active = getActiveAgent();
  rows.innerHTML = AGENTS.map(a => `
    <button class="agent-row" role="menuitem" data-agent="${a.id}" aria-selected="${a.id === active.id}">
      <span class="agent-row-avatar"><span class="dot" style="background:${a.color}"></span></span>
      <span class="agent-row-meta">
        <span class="agent-row-name">${a.name}</span>
        <span class="agent-row-desc">${a.desc}</span>
      </span>
      <svg class="agent-row-check" viewBox="0 0 14 14" aria-hidden="true">
        <path d="M3 7.5 L6 10 L11 4.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  `).join('');
  rows.querySelectorAll('.agent-row').forEach(r => {
    r.addEventListener('click', () => {
      const id = r.dataset.agent;
      const cur = getActiveAgent();
      if (id === cur.id) { closeAllMenus(); return; }
      const s = currentSession();
      if (s && s.messages.length === 0) {
        // Empty session — retag in place. No new session.
        s.agentId = id;
        pendingAgentId = null;
      } else {
        // Session has messages — enter pending state: blank chat view under
        // the new agent, but no new session is created until the user sends
        // the first message (handled in submit()).
        pendingAgentId = id;
      }
      // Order matters: mutate state above before setActiveAgent re-renders
      // the chip/menu, so getActiveAgent() returns the new selection.
      setActiveAgent(id);
      closeAllMenus();
      save();
      render();
    });
  });
}
renderAgentChip();
renderAgentMenu();

function toggleMenu(triggerId, menuId) {
  const trigger = document.getElementById(triggerId);
  const menu = document.getElementById(menuId);
  if (!trigger || !menu) return;
  const open = !menu.hidden;
  closeAllMenus();
  if (!open) {
    menu.hidden = false;
    trigger.setAttribute('aria-expanded', 'true');
  }
}
function closeAllMenus() {
  ['agentMenu', 'userMenu'].forEach(id => {
    const m = document.getElementById(id);
    if (m) m.hidden = true;
  });
  ['agentChip', 'userRow'].forEach(id => {
    const t = document.getElementById(id);
    if (t) t.setAttribute('aria-expanded', 'false');
  });
  document.querySelectorAll('.session-item .session-row-menu').forEach(m => { m.hidden = true; });
  const am = document.getElementById('attachMenu');
  if (am && !am.hidden) { am.hidden = true; const ab = document.getElementById('attachBtn'); if (ab) ab.setAttribute('aria-expanded', 'false'); }
}
const agentChipBtn = document.getElementById('agentChip');
if (agentChipBtn) agentChipBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMenu('agentChip', 'agentMenu');
});
const userRowBtn = document.getElementById('userRow');
if (userRowBtn) userRowBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMenu('userRow', 'userMenu');
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.agent-menu') && !e.target.closest('#agentChip') &&
      !e.target.closest('.user-menu') && !e.target.closest('#userRow') &&
      !e.target.closest('.session-item')) {
    closeAllMenus();
  } else if (!e.target.closest('.session-item')) {
    // Other menu host clicked — leave session row menus alone, they'll be closed by their toggle
  } else {
    // Click landed inside a session row — close OTHER row menus.
    const here = e.target.closest('.session-item');
    document.querySelectorAll('.session-item .session-row-menu').forEach(m => {
      if (!here.contains(m)) m.hidden = true;
    });
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAllMenus();
});

// Keyboard: ⌘N new session, ⌘\ collapse sidebar
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'n' && !e.shiftKey) {
    e.preventDefault();
    newSession();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '\\') {
    e.preventDefault();
    if (collapseBtn) collapseBtn.click();
  }
});

// Auto-title a new session from the first user message.
// Patch: wrap buildUserSend etc? Simpler — observe the messages array on save().
// We intercept by wrapping save once:
const _origSave = save;
save = function() {
  const s = currentSession();
  if (s && s.title === 'new session') {
    const firstUser = s.messages.find(m => m.role === 'you' && m.text);
    if (firstUser) {
      s.title = firstUser.text.split('\n')[0].slice(0, 48).toLowerCase();
    }
  }
  _origSave();
};

// Session-title tooltip (only shows when title is truncated by mask/overflow).
(() => {
  const tt = document.createElement('div');
  tt.className = 'ax-tooltip';
  tt.setAttribute('role', 'tooltip');
  document.body.appendChild(tt);
  let showTimer = null;
  let currentTarget = null;
  function hide() {
    clearTimeout(showTimer);
    tt.classList.remove('visible');
    currentTarget = null;
  }
  function show(targetEl) {
    if (currentTarget === targetEl) return;
    currentTarget = targetEl;
    // Only show if actually truncated.
    if (targetEl.scrollWidth <= targetEl.clientWidth + 1) { hide(); return; }
    tt.textContent = targetEl.textContent;
    // Position above the title, left-aligned to it.
    const r = targetEl.getBoundingClientRect();
    // First reveal off-screen to measure
    tt.style.left = '-9999px';
    tt.style.top = '0px';
    requestAnimationFrame(() => {
      const tw = tt.offsetWidth;
      const th = tt.offsetHeight;
      let x = r.left;
      const maxX = window.innerWidth - tw - 8;
      if (x > maxX) x = maxX;
      if (x < 8) x = 8;
      const arrowX = Math.max(8, Math.min(tw - 16, r.left - x + 12));
      tt.style.setProperty('--arrow-x', arrowX + 'px');
      tt.style.left = x + 'px';
      tt.style.top = (r.top - th - 8) + 'px';
      tt.classList.add('visible');
    });
  }
  document.addEventListener('mouseover', (e) => {
    const titleEl = e.target.closest('.session-title');
    if (!titleEl) return;
    if (titleEl.classList.contains('editing')) return;
    clearTimeout(showTimer);
    showTimer = setTimeout(() => show(titleEl), 240);
  });
  document.addEventListener('mouseout', (e) => {
    const titleEl = e.target.closest('.session-title');
    if (!titleEl) return;
    if (e.relatedTarget && titleEl.contains(e.relatedTarget)) return;
    hide();
  });
  // Hide on scroll / click anywhere
  window.addEventListener('scroll', hide, true);
  document.addEventListener('click', hide, true);
})();

renderSessions();
updateSessionHeader();
</script>
