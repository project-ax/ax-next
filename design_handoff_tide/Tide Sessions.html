<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tide — Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     TIDE MINIMAL
     One column. One chat.

     No rail, no meta, no ruler, no breaks. The chat IS the UI.
     ========================================================= */

  :root {
    /* Warm paper, muted teal, brown-ink */
    --bg:         #f6f6f3;
    --surface-raised: #fcfbf8; /* near-white card surface (composer, etc.) */
    --ink:        #17181a;
    --ink-soft:   #44464b;
    --ink-mute:   #8a857a;
    --ink-ghost:  #b8b3a6;
    --rule:       #dad8cf;
    --bg-deep:    #eeede8;
    --accent:     #1e6b6b;           /* muted teal */
    --accent-soft:#dce9e7;
    --you-wash:   #ecede6;           /* warm paper wash */
    --you-ink:    #17181a;
    --shadow-sm:  0 1px 2px rgba(23, 24, 26, 0.04), 0 1px 1px rgba(23, 24, 26, 0.03);
    --shadow-md:  0 8px 24px rgba(23, 24, 26, 0.06), 0 1px 2px rgba(23, 24, 26, 0.04);
    --sans:  'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono:  'IBM Plex Mono', 'JetBrains Mono', ui-monospace, monospace;
    --serif: var(--sans); /* legacy alias — Plex Sans handles all body text now */
    --user-font: var(--sans);
    --agent-font: var(--sans);
    --user-size: 15px;
    --agent-size: 15.5px;
    --agent-style: normal;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:         #15171a;
      --surface-raised: #1f2125;
      --ink:        #e8e4da;
      --ink-soft:   #b0ab9f;
      --ink-mute:   #7e7a72;
      --ink-ghost:  #4a4842;
      --rule:       #2b2d32;
      --bg-deep:    #1c1e22;
      --accent:     #4ba39e;
      --accent-soft:#1f2f34;
      --you-wash:   #22242a;
      --you-ink:    #e8e4da;
      --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md:  0 8px 24px rgba(0, 0, 0, 0.4);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg:         #15171a;
    --surface-raised: #1f2125;
    --ink:        #e8e4da;
    --ink-soft:   #b0ab9f;
    --ink-mute:   #7e7a72;
    --ink-ghost:  #4a4842;
    --rule:       #2b2d32;
    --bg-deep:    #1c1e22;
    --accent:     #4ba39e;
    --accent-soft:#1f2f34;
    --you-wash:   #22242a;
    --you-ink:    #e8e4da;
    --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md:  0 8px 24px rgba(0, 0, 0, 0.4);
    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.58;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.005em;
    /* Plex Sans humanist alternates: ss02 = single-storey a, ss05 = single-storey g */
    font-feature-settings: 'ss02', 'ss05';
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: row;
  }
  .pane {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }

  /* =========================================================
     SIDEBAR — left column, sessions list.
     Quiet rail: a thin column, flush-left, same bg as main.
     Sessions are the primary unit; click to switch.
     ========================================================= */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--rule);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    align-self: flex-start;
    height: 100vh;
    overflow: visible; /* allow popovers to escape */
    transition: width 220ms cubic-bezier(.2,.7,.2,1);
  }
  body.sidebar-collapsed .sidebar { width: 56px; }

  .sidebar-head {
    padding: 14px 12px 10px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: relative;
  }
  body.sidebar-collapsed .sidebar-head {
    padding: 14px 8px 10px;
    justify-content: center;
  }

  /* BRAND — wordmark at top of sidebar */
  .brand {
    display: flex;
    align-items: center;
    padding: 4px 0 6px;
    text-decoration: none;
    color: inherit;
    min-width: 0;
  }
  .brand-word {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1;
  }
  body.sidebar-collapsed .brand-word { display: none; }
  body.sidebar-collapsed .brand { display: none; }

  /* AGENT CHIP — primary identity at top of sidebar */
  .agent-chip {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px 7px 8px;
    border-radius: 8px;
    transition: background 120ms ease;
    min-width: 0;
  }
  .agent-chip:hover { background: var(--bg-deep); }
  .agent-chip[aria-expanded="true"] { background: var(--bg-deep); }
  .agent-chip-avatar {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, var(--bg-deep)), var(--bg-deep));
    border: 1px solid var(--rule);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .agent-chip-avatar .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .agent-chip-name {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .agent-chip-caret {
    width: 10px; height: 10px;
    color: var(--ink-mute);
    margin-left: auto;
    flex-shrink: 0;
    transition: transform 160ms ease;
  }
  .agent-chip[aria-expanded="true"] .agent-chip-caret { transform: rotate(180deg); }

  /* AGENT MENU — popover (anchored to header-left) */
  .agent-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    z-index: 70;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 12px 40px -8px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.04);
    padding: 6px;
    min-width: 260px;
    animation: popIn 140ms cubic-bezier(.2,.7,.2,1);
  }
  .agent-menu-note {
    padding: 8px 10px 4px;
    font-size: 10.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.04em;
    border-top: 1px solid var(--rule);
    margin-top: 4px;
    text-align: center;
  }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(-4px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .agent-menu-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    padding: 8px 10px 4px;
  }
  .agent-menu-rows { display: flex; flex-direction: column; gap: 1px; }
  .agent-row {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: 6px;
    transition: background 100ms ease;
  }
  .agent-row:hover { background: var(--bg-deep); }
  .agent-row[aria-selected="true"] { background: var(--bg-deep); }
  .agent-row-avatar {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--bg-deep);
    border: 1px solid var(--rule);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .agent-row-avatar .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
  }
  .agent-row-meta { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
  .agent-row-name {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .agent-row-desc {
    font-size: 11px;
    color: var(--ink-mute);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agent-row-check {
    width: 14px; height: 14px;
    color: var(--accent);
    flex-shrink: 0;
    opacity: 0;
  }
  .agent-row[aria-selected="true"] .agent-row-check { opacity: 1; }
  .agent-menu-foot {
    padding: 4px 0 2px;
    margin-top: 4px;
    border-top: 1px solid var(--rule);
  }
  .agent-menu-item {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--ink-soft);
    width: calc(100% - 0px);
    box-sizing: border-box;
  }
  .agent-menu-item:hover { background: var(--bg-deep); color: var(--ink); }

  /* NEW SESSION BUTTON — secondary in hierarchy */
  .new-session-btn {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    transition: background 120ms ease, color 120ms ease;
  }
  .new-session-btn:hover {
    background: var(--bg-deep);
    color: var(--ink);
  }
  .new-session-btn svg {
    width: 13px;
    height: 13px;
    color: var(--ink-mute);
    flex-shrink: 0;
  }
  .new-session-btn:hover svg { color: var(--ink); }
  .new-session-btn .label { min-width: 0; }
  .new-session-btn .kbd {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.02em;
    opacity: 0;
    transition: opacity 140ms ease;
  }
  .new-session-btn:hover .kbd,
  .new-session-btn:focus-visible .kbd { opacity: 1; }
  body.sidebar-collapsed .new-session-btn .label,
  body.sidebar-collapsed .new-session-btn .kbd { display: none; }
  body.sidebar-collapsed .new-session-btn { justify-content: center; padding: 8px; }

  .sessions-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--ink-ghost) transparent;
  }
  body.sidebar-collapsed .sessions-scroll { visibility: hidden; pointer-events: none; }
  .sessions-scroll::-webkit-scrollbar { width: 6px; }
  .sessions-scroll::-webkit-scrollbar-track { background: transparent; }
  .sessions-scroll::-webkit-scrollbar-thumb { background: var(--ink-ghost); border-radius: 3px; }

  .sessions-group-label {
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    padding: 14px 12px 6px;
    font-weight: 500;
  }

  .session-item {
    all: unset;
    cursor: pointer;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 4px;
    color: var(--ink-soft);
    transition: background 120ms ease, color 120ms ease;
    position: relative;
    box-sizing: border-box;
    height: 34px;
  }
  .session-agent-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
    opacity: 0.8;
  }
  .session-item:hover .session-agent-dot,
  .session-item.active .session-agent-dot { opacity: 1; }
  .session-item:hover {
    background: var(--bg-deep);
    color: var(--ink);
  }
  .session-item.active {
    background: var(--bg-deep);
    color: var(--ink);
  }
  .session-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: var(--accent);
    border-radius: 2px;
  }
  .session-title {
    font-size: 13px;
    line-height: 1.35;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    /* Fade out at the right edge instead of …; reads cleaner next to the ⋯ button. */
    -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 18px), transparent 100%);
            mask-image: linear-gradient(to right, #000 calc(100% - 18px), transparent 100%);
    flex: 1;
    min-width: 0;
  }
  /* While editing or hovered (⋯ visible), give the fade a wider runway so the
     caret/last char doesn't disappear under the button. */
  .session-item:hover .session-title,
  .session-item.active .session-title {
    -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 28px), transparent 100%);
            mask-image: linear-gradient(to right, #000 calc(100% - 28px), transparent 100%);
  }
  .session-title.editing {
    -webkit-mask-image: none;
            mask-image: none;
  }
  .session-title.editing {
    -webkit-line-clamp: unset;
    display: block;
    overflow: visible;
    outline: none;
    background: var(--bg);
    box-shadow: 0 0 0 1px var(--border-soft);
    border-radius: 3px;
    padding: 1px 4px;
    margin: -1px -4px;
    color: var(--ink);
    cursor: text;
    -webkit-user-modify: read-write-plaintext-only;
  }
  .session-more {
    all: unset;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    color: var(--ink-ghost);
    opacity: 0;
    transition: opacity 120ms ease, background 120ms ease, color 120ms ease;
    cursor: pointer;
    margin-top: 1px;
  }
  .session-more svg { width: 14px; height: 14px; }
  .session-item:hover .session-more,
  .session-item.active .session-more { opacity: 1; }
  .session-more:hover {
    background: var(--bg);
    color: var(--ink);
  }
  /* Per-row floating menu (rename / delete) */
  .session-row-menu[hidden] { display: none; }
  .session-row-menu {
    position: absolute;
    top: 28px;
    right: 8px;
    z-index: 30;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    padding: 4px;
    min-width: 130px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .session-row-menu-item {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    font-size: 12.5px;
    color: var(--ink);
    border-radius: 3px;
    transition: background 100ms ease, color 100ms ease;
  }
  .session-row-menu-item svg {
    width: 12px; height: 12px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .session-row-menu-item:hover {
    background: var(--bg-deep);
  }
  .session-row-menu-item.danger { color: var(--danger, #c25450); }
  .session-row-menu-item.danger svg { color: var(--danger, #c25450); }
  .session-row-menu-item.danger:hover {
    background: color-mix(in oklch, var(--danger, #c25450) 14%, transparent);
  }
  /* Inline delete confirm */
  .session-item.confirming-delete {
    background: color-mix(in oklch, var(--danger, #c25450) 10%, transparent);
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    cursor: default;
  }
  .session-item.confirming-delete .confirm-text {
    flex: 1;
    font-size: 12px;
    color: var(--ink);
    line-height: 1.35;
    letter-spacing: -0.005em;
  }
  .confirm-btn {
    all: unset;
    cursor: pointer;
    font-size: 11.5px;
    line-height: 1;
    padding: 3px 7px;
    border-radius: 3px;
    transition: background 100ms ease, color 100ms ease;
  }
  .confirm-btn.cancel {
    color: var(--ink-soft);
  }
  .confirm-btn.cancel:hover { color: var(--ink); }
  .confirm-btn.danger {
    color: var(--danger, #c25450);
    font-weight: 500;
  }
  .confirm-btn.danger:hover {
    background: var(--danger, #c25450);
    color: white;
  }
  .session-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 10.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.02em;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-meta .dot {
    width: 2px; height: 2px; border-radius: 50%;
    background: currentColor;
    display: inline-block;
  }
  .session-item.unread .session-title::after {
    content: '';
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* SIDEBAR COLLAPSE TOGGLE — desktop only, sits at top-right of sidebar head */
  .sidebar-collapse {
    all: unset;
    cursor: pointer;
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-mute);
    border-radius: 4px;
    flex-shrink: 0;
    transition: color 140ms ease, background 140ms ease;
  }
  .sidebar-collapse:hover { color: var(--ink); background: var(--bg-deep); }
  .sidebar-collapse:focus-visible { color: var(--ink); background: var(--bg-deep); }
  .sidebar-collapse svg { width: 16px; height: 16px; }

  /* USER ROW + MENU at bottom */
  .user-row-wrap {
    border-top: 1px solid var(--rule);
    padding: 8px;
    position: relative;
  }
  .user-row {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    border-radius: 8px;
    width: calc(100% - 16px);
    transition: background 120ms ease;
  }
  .user-row:hover,
  .user-row[aria-expanded="true"] { background: var(--bg-deep); }
  .user-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 26%, var(--bg-deep)), var(--bg-deep));
    border: 1px solid var(--rule);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 11px;
    color: var(--ink);
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .user-avatar.lg { width: 32px; height: 32px; font-size: 12.5px; }
  .user-meta {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
    flex: 1;
  }
  .user-row .user-name {
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.15;
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-row .user-email {
    font-size: 10.5px;
    color: var(--ink-mute);
    line-height: 1.15;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-caret {
    width: 10px; height: 10px;
    color: var(--ink-mute);
    flex-shrink: 0;
    transition: transform 160ms ease;
  }
  .user-row[aria-expanded="true"] .user-caret { transform: rotate(180deg); }
  body.sidebar-collapsed .user-meta,
  body.sidebar-collapsed .user-caret { display: none; }
  body.sidebar-collapsed .user-row { justify-content: center; padding: 7px; }

  /* USER MENU popover (anchored above the user row) */
  .user-menu {
    position: absolute;
    bottom: calc(100% - 4px);
    left: 8px;
    right: 8px;
    z-index: 70;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 -8px 40px -8px rgba(0,0,0,0.18), 0 -2px 6px rgba(0,0,0,0.04);
    padding: 6px;
    animation: popInUp 140ms cubic-bezier(.2,.7,.2,1);
  }
  body.sidebar-collapsed .user-menu {
    left: 56px;
    right: auto;
    bottom: 8px;
    width: 240px;
  }
  @keyframes popInUp {
    from { opacity: 0; transform: translateY(4px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .user-menu-head {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px 10px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 4px;
  }
  .user-menu-head .user-name {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .user-menu-head .user-email {
    font-size: 11px;
    color: var(--ink-mute);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-item {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--ink-soft);
    transition: background 100ms ease, color 100ms ease;
  }
  .user-menu-item:hover { background: var(--bg-deep); color: var(--ink); }
  .user-menu-item svg { width: 13px; height: 13px; color: var(--ink-mute); flex-shrink: 0; }
  .user-menu-item:hover svg { color: var(--ink); }
  .user-menu-item .kbd {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-ghost);
  }
  .user-menu-divider {
    height: 1px;
    background: var(--rule);
    margin: 4px 0;
  }
  .user-menu-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .user-menu-row svg { width: 13px; height: 13px; color: var(--ink-mute); flex-shrink: 0; }
  .user-menu-row .label { flex: 1; }
  .theme-seg {
    display: inline-flex;
    background: var(--bg-deep);
    border-radius: 6px;
    padding: 2px;
    border: 1px solid var(--rule);
  }
  .theme-seg button {
    all: unset;
    cursor: pointer;
    width: 24px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    color: var(--ink-mute);
    transition: background 120ms ease, color 120ms ease;
  }
  .theme-seg button svg { width: 12px; height: 12px; }
  .theme-seg button:hover { color: var(--ink); }
  .theme-seg button[aria-checked="true"] {
    background: var(--bg);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .user-menu-foot {
    padding: 8px 10px 4px;
    margin-top: 4px;
    border-top: 1px solid var(--rule);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-ghost);
  }

  /* Mobile-only sidebar overlay toggle (kept) */
  .sidebar-toggle {
    all: unset;
    display: none;
    cursor: pointer;
    position: fixed;
    left: 10px;
    top: 10px;
    width: 32px; height: 32px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--rule);
    align-items: center;
    justify-content: center;
    z-index: 60;
    color: var(--ink-soft);
  }
  @media (max-width: 720px) {
    body { flex-direction: column; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      width: 260px !important; /* override collapsed on mobile */
      z-index: 55;
      transform: translateX(-100%);
      transition: transform 200ms ease;
      box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    body.sidebar-open .sidebar { transform: translateX(0); }
    body.sidebar-collapsed .sidebar { width: 260px !important; }
    .sidebar-toggle { display: inline-flex; }
    .sidebar-collapse { display: none; }
    .pane { min-height: 100vh; }
  }
  ::selection { background: color-mix(in srgb, var(--accent) 28%, transparent); color: var(--ink); }

  /* ---- Header: just a wordmark. No counts, no status. ---- */
  .header {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 22px 24px 18px;
    display: flex;
    justify-content: center;
    z-index: 10;
  }
  .header-inner {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .session-breadcrumb {
    font-size: 10.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 360px;
    align-self: center;
    margin-left: auto;
    padding: 4px 8px;
    margin-right: -8px;
    border-radius: 4px;
    cursor: text;
    transition: background 120ms ease, color 120ms ease;
  }
  .session-breadcrumb:hover {
    background: var(--bg-deep);
    color: var(--ink-mute);
  }
  .session-breadcrumb.editing {
    background: var(--bg);
    color: var(--ink);
    outline: 1px solid var(--rule);
    overflow: visible;
    text-overflow: clip;
    cursor: text;
  }
  .session-breadcrumb.editing:focus { outline: 1px solid var(--accent); }
  .header-left {
    position: relative;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .wordmark {
    font-family: var(--sans);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .wordmark-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    transform: translateY(-3px);
  }
  .theme-btn {
    all: unset;
    cursor: pointer;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 140ms ease;
  }
  .theme-btn:hover { color: var(--ink); }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* ---- Timeline ---- */
  .timeline {
    flex: 1;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 24px 220px;
  }

  /* ---- Day marker: just a small centered date. Rarely seen. ---- */
  .day {
    text-align: center;
    margin: 28px 0 20px;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-mute);
    text-transform: uppercase;
    font-family: var(--mono);
  }

  /* ---- Message: no avatar, no meta column. Just text. ---- */
  .msg {
    margin-bottom: 22px;
    position: relative;
    max-width: 100%;
  }

  .msg-body {
    font-family: var(--user-font);
    font-size: var(--user-size);
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }
  .msg-body p { margin-bottom: 0.6em; }
  .msg-body p:last-child { margin-bottom: 0; }

  /* Subtle role differentiation: user is right-aligned with a
     warm wash; agent is left-aligned plain prose. No bubbles;
     the wash is barely visible. Serif for the agent. */
  .msg.you {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .msg.you .msg-body {
    background: var(--you-wash);
    color: var(--you-ink);
    padding: 7px 12px;
    border-radius: 6px;
    max-width: 78%;
  }
  .msg.you .msg-footer {
    justify-content: flex-end;
  }
  .msg.agent .msg-body {
    font-family: var(--agent-font);
    font-size: var(--agent-size);
    font-style: var(--agent-style);
    line-height: 1.55;
    letter-spacing: -0.008em;
    max-width: 56ch;
  }

  /* =========================================================
     CHART EMBED — an iframe-based chart rendered inline in an
     agent response. The iframe is sandboxed (no scripts, no
     same-origin) so it can render arbitrary HTML the model
     emits without risk. The HOST styles the frame; the CONTENT
     styles itself to match Tide tokens (passed in via the doc).
     ========================================================= */
  .chart-embed {
    margin: 12px 0 4px;
    max-width: 56ch;
    position: relative;
  }
  .chart-embed-frame {
    width: 100%;
    min-height: 160px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--bg);
    display: block;
    transition: border-color 180ms ease;
  }
  .chart-embed:hover .chart-embed-frame {
    border-color: var(--ink-ghost);
  }
  .chart-embed-caption {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
    font-family: var(--mono);
  }
  .chart-embed-caption .label {
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .chart-embed-caption .meta {
    color: var(--ink-ghost);
    font-style: normal;
    font-family: var(--mono);
    letter-spacing: 0.02em;
    text-transform: none;
  }
  .chart-embed-actions {
    display: inline-flex;
    gap: 10px;
    opacity: 0;
    transition: opacity 160ms ease;
  }
  .chart-embed:hover .chart-embed-actions { opacity: 1; }
  .chart-embed-action {
    all: unset;
    cursor: pointer;
    color: var(--ink-mute);
    font-size: 11px;
    transition: color 120ms ease;
  }
  .chart-embed-action:hover { color: var(--ink); }

  /* Loading skeleton */
  .chart-embed.loading .chart-embed-frame {
    border-style: dashed;
    border-color: var(--ink-ghost);
    background: repeating-linear-gradient(
      45deg,
      transparent 0 12px,
      color-mix(in srgb, var(--ink-ghost) 8%, transparent) 12px 14px
    );
  }
  .chart-embed.loading::before {
    content: 'drawing…';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-mute);
    z-index: 1;
  }

  /* Hover: show a tiny timestamp + action icons. */
  .msg-footer {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 4px;
    font-size: 11px;
    color: var(--ink-ghost);
    opacity: 0;
    transition: opacity 140ms ease;
    letter-spacing: 0.02em;
    white-space: nowrap;
    font-family: var(--mono);
  }
  .msg-footer .msg-time { padding-right: 4px; }
  .msg:hover .msg-footer,
  .msg-footer:focus-within { opacity: 1; }
  .msg-action {
    all: unset;
    cursor: pointer;
    width: 22px; height: 22px;
    border-radius: 4px;
    color: var(--ink-mute);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 120ms ease, background 120ms ease;
  }
  .msg-action:hover { color: var(--ink); background: var(--bg-deep); }
  .msg-action svg { width: 13px; height: 13px; display: block; }
  .msg-action.copied { color: var(--accent); }
  /* User-message footer aligns right (mirroring the bubble) */
  .msg.you .msg-footer { justify-content: flex-end; }

  /* Edit-in-place state for user messages */
  .msg-body.editing {
    outline: none;
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 35%, transparent);
    border-radius: 6px;
    cursor: text;
    -webkit-user-modify: read-write-plaintext-only;
  }
  /* Retrying placeholder: dim while we wait for the new reply */
  .msg-body.retrying {
    color: var(--ink-mute);
    font-style: italic;
  }

  /* Entry animation */
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.entering { animation: msg-in 280ms cubic-bezier(0.2,0.8,0.2,1) both; }

  /* Thinking — one dot that breathes, nothing else */
  .thinking {
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 2px;
  }
  .thinking::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: breathe 1.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.25; transform: scale(0.8); }
    50%      { opacity: 1;    transform: scale(1.15); }
  }

  /* ---- Composer: fixed to bottom of the chat pane (not over sidebar) ---- */
  .composer {
    position: fixed;
    bottom: 0; left: 240px; right: 0;
    transition: left 220ms cubic-bezier(.2,.7,.2,1);
    padding: 40px 24px 22px;
    background: linear-gradient(to top,
      var(--bg) 60%,
      color-mix(in srgb, var(--bg) 80%, transparent) 85%,
      transparent 100%);
    display: flex;
    justify-content: center;
    z-index: 20;
  }
  .composer-inner {
    width: 100%;
    max-width: 640px;
  }
  body.sidebar-collapsed .composer { left: 56px; }
  @media (max-width: 720px) {
    .composer { left: 0; }
  }

  .composer-field {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface-raised);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 10px 12px 10px 14px;
    box-shadow: var(--shadow-sm);
    transition: border-color 140ms ease, box-shadow 140ms ease;
  }
  .composer-field:focus-within {
    border-color: color-mix(in srgb, var(--accent) 40%, var(--rule));
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent), var(--shadow-sm);
  }
  .composer textarea {
    all: unset;
    flex: 1 1 auto;
    min-width: 0;
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink);
    resize: none;
    /* Match the 28px attach-btn / 30px send-btn height when single-line, so
       align-items: flex-end centers them visually too (bottoms aligned ⇒
       centers aligned when heights match). */
    min-height: 28px;
    max-height: 180px;
    padding: 2px 0;
    box-sizing: border-box;
  }
  .composer textarea::placeholder { color: var(--ink-mute); }
  .send-btn {
    all: unset;
    cursor: pointer;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--ink-ghost);
    color: #ffffff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 140ms ease, transform 140ms ease;
  }
  .send-btn.ready { background: var(--accent); }
  .send-btn:hover.ready { transform: scale(1.05); filter: brightness(1.05); }
  .send-btn svg { width: 14px; height: 14px; }

  /* Attach (+) button + popup menu */
  .attach-btn {
    all: unset;
    cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 50%;
    color: var(--ink-mute);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-right: 4px;
    transition: background 120ms ease, color 120ms ease;
  }
  .attach-btn:hover {
    background: var(--bg-deep);
    color: var(--ink);
  }
  .attach-btn[aria-expanded="true"] {
    background: var(--bg-deep);
    color: var(--ink);
  }
  .attach-btn svg { width: 14px; height: 14px; }
  .attach-menu {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0;
    z-index: 40;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 4px;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .attach-menu[hidden] { display: none; }
  .composer-field { position: relative; }
  .attach-menu-item {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--ink);
    border-radius: 4px;
    transition: background 100ms ease;
  }
  .attach-menu-item svg {
    width: 14px; height: 14px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .attach-menu-item:hover { background: var(--bg-deep); }
  /* Hide attach button while in search mode */
  body.searching .attach-btn { display: none; }

  /* Session title tooltip — singleton, fades in after a short hover delay */
  .ax-tooltip {
    position: fixed;
    z-index: 1000;
    pointer-events: none;
    background: var(--ink);
    color: var(--bg);
    font-size: 11.5px;
    line-height: 1.35;
    letter-spacing: -0.005em;
    padding: 5px 9px;
    border-radius: 4px;
    max-width: 320px;
    white-space: normal;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 120ms ease 220ms, transform 120ms ease 220ms;
  }
  .ax-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .ax-tooltip::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: var(--arrow-x, 12px);
    width: 8px; height: 8px;
    background: var(--ink);
    transform: rotate(45deg);
    border-radius: 1px;
  }

  .composer-hint {
    margin-top: 8px;
    font-size: 10.5px;
    color: var(--ink-ghost);
    text-align: center;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 140ms ease;
    pointer-events: none;
  }
  .composer:hover .composer-hint,
  .composer:focus-within .composer-hint,
  body.searching .composer-hint {
    opacity: 1;
  }
  .composer-hint kbd {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-mute);
  }

  /* ---- Search mode ---- */
  /* When body.searching is set, the composer becomes a search field.
     Visually: the field gets a subtle accent tint; the send icon
     flips to a × (clear); the hint changes to search-specific. */
  body.searching .composer-field {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent);
  }
  body.searching .send-btn {
    background: var(--ink-mute);
  }
  body.searching .send-btn.ready {
    background: var(--ink);
  }
  .search-prefix {
    display: none;
    color: var(--ink-mute);
    font-size: 13px;
    margin-right: -2px;
    letter-spacing: 0.04em;
    user-select: none;
  }
  body.searching .search-prefix { display: inline-block; }

  /* Highlight matches inside message bodies */
  mark.hit {
    background: color-mix(in srgb, var(--accent) 30%, transparent);
    color: var(--ink);
    padding: 0 2px;
    border-radius: 2px;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  body:not(.searching) .msg.miss { display: none; } /* never actually used */
  body.searching .msg.miss { display: none; }
  body.searching .day { display: none; }
  body.searching .msg.current-hit .msg-body {
    outline: 2px solid var(--accent);
    outline-offset: 6px;
    border-radius: 4px;
    transition: outline-color 160ms ease;
  }

  /* Search status bar — tiny, above the composer */
  .search-status {
    position: fixed;
    left: 0; right: 0;
    bottom: 96px;
    display: none;
    justify-content: center;
    pointer-events: none;
    z-index: 19;
  }
  body.searching .search-status { display: flex; }
  .search-status-pill {
    pointer-events: auto;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--ink-mute);
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.02em;
  }
  .search-status-pill strong { color: var(--ink); font-weight: 500; }
  .search-status-pill .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--ink-ghost);
  }
  .search-status-pill button {
    all: unset;
    cursor: pointer;
    color: var(--ink-mute);
    transition: color 120ms ease;
  }
  .search-status-pill button:hover { color: var(--ink); }
  .search-status-pill.semantic { border-color: var(--accent); color: var(--ink-soft); }
  .search-status-pill.semantic strong { color: var(--accent); }

  /* Empty-state inside timeline when no matches */
  .search-empty {
    text-align: center;
    padding: 80px 0;
    color: var(--ink-mute);
    font-size: 13px;
  }
  .search-empty .big {
    font-family: var(--sans);
    font-size: 18px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    letter-spacing: -0.005em;
  }
  .search-empty button {
    all: unset;
    cursor: pointer;
    color: var(--accent);
    border-bottom: 1px dotted var(--accent);
    margin-top: 10px;
    display: inline-block;
    font-size: 12.5px;
  }
  .search-empty button:hover { color: var(--ink); border-color: var(--ink); }
  .search-thinking {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: breathe 1.6s ease-in-out infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* ---- Empty state intro ---- */
  .intro {
    text-align: center;
    color: var(--ink-mute);
    padding: 64px 0 40px;
    font-size: 13.5px;
  }
  .intro .big {
    font-family: var(--sans);
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* ---- Tweaks panel ---- */
  .tweaks {
    position: fixed;
    right: 16px;
    top: 64px;
    width: 220px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.06);
    padding: 14px;
    font-size: 12px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 180ms ease, transform 180ms ease;
  }
  .tweaks.visible {
    opacity: 1; pointer-events: auto; transform: translateY(0);
  }
  .tweaks-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 10px;
  }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row:last-child { margin-bottom: 0; }
  .tweak-label {
    font-size: 10.5px;
    color: var(--ink-mute);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .tweak-seg {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 2px;
    padding: 2px;
    background: var(--bg-deep);
    border-radius: 6px;
  }
  .tweak-seg button {
    all: unset;
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    padding: 5px 0;
    border-radius: 4px;
    color: var(--ink-mute);
    transition: background 120ms ease, color 120ms ease;
  }
  .tweak-seg button:hover { color: var(--ink); }
  .tweak-seg button.current {
    background: var(--bg);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  /* --- Density --- */
  [data-density="tight"] .msg { margin-bottom: 14px; }
  [data-density="loose"] .msg { margin-bottom: 32px; }

  /* --- Agent voice variant: sans instead of serif --- */
  [data-voice="sans"] .msg.agent .msg-body {
    font-family: var(--sans);
    font-size: 15px;
    letter-spacing: -0.005em;
  }

  @media (max-width: 640px) {
    .tweaks { display: none; }
    .msg.you .msg-body { max-width: 86%; }
    .tide-line { display: none; }
  }

  /* ---- TIDE LINE: calendar ruler, left edge ----
     A 4px strip that maps to calendar days (not doc position).
     Hover to scrub. Each tick = 1 day; opacity encodes density. */
  /* Tide-line is disabled in the sessions variant — the sidebar's session
     list is the primary way to navigate across time, making the per-session
     calendar rail redundant and visually noisy. */
  .tide-line, .tide-chip { display: none !important; }

  .tide-line {
    width: 20px;
    z-index: 25;
    cursor: ns-resize;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 0 120px;
    gap: 0;
    transition: background 180ms ease;
  }
  .tide-line:hover { background: color-mix(in srgb, var(--bg-deep) 70%, transparent); }
  .tide-line-track {
    position: relative;
    width: 4px;
    flex: 1;
    background: transparent;
  }
  .tide-day {
    position: absolute;
    left: 0; right: 0;
    background: var(--ink-ghost);
    transition: background 140ms ease, transform 140ms ease;
  }
  .tide-line:hover .tide-day { background: var(--ink-mute); }
  .tide-day.d0    { opacity: 0.22; }   /* quiet day */
  .tide-day.d1    { opacity: 0.45; }
  .tide-day.d2    { opacity: 0.7; }
  .tide-day.d3    { opacity: 1; }      /* busy day */
  .tide-day.today { background: var(--accent); opacity: 1; }
  .tide-label {
    position: absolute;
    left: 16px;
    transform: translateY(-50%);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 160ms ease;
    font-family: var(--mono);
  }
  .tide-line:hover .tide-label { opacity: 0.8; }
  .tide-label.anchor { opacity: 0.55; }
  .tide-line:hover .tide-label.anchor { opacity: 0.9; }

  .tide-cursor {
    position: absolute;
    left: -3px; right: -3px;
    height: 2px;
    background: var(--accent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 140ms ease;
    z-index: 2;
  }
  .tide-line:hover .tide-cursor,
  .tide-line.pinned .tide-cursor { opacity: 1; }

  .tide-chip {
    position: fixed;
    left: 30px;
    transform: translateY(-50%);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--ink);
    max-width: 280px;
    min-width: 200px;
    z-index: 26;
    opacity: 0;
    pointer-events: none;
    transition: opacity 140ms ease, transform 140ms ease;
  }
  .tide-chip.visible {
    opacity: 1;
    transform: translateY(-50%);
  }
  .tide-chip-date {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .tide-chip-count {
    font-size: 10.5px;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .tide-chip-summary {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
    font-style: italic;
    min-height: 18px;
  }
  .tide-chip-summary.loading::after {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: breathe 1.6s ease-in-out infinite;
    vertical-align: middle;
  }

  /* ---- (topic-break feature removed) ---- */
  .brk-removed {
    /* placeholder so unused selector cleanup doesn't break sandwiched rules */
    display: none;
  }
  .legacy-removed-edit {
    /* placeholder so unused selector cleanup doesn't break sandwiched rules */
    display: none;
    border-radius: 4px;
    background: var(--bg-deep);
  }
  .brk-x {
    all: unset;
    font-size: 14px;
    line-height: 1;
    color: var(--ink-ghost);
    padding: 2px 6px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 160ms ease, color 120ms ease;
  }
  .brk:hover .brk-x { opacity: 1; }
  .brk-x:hover { color: var(--ink); }

  /* Ghost gutter between messages: click to insert a break */
  /* Dim messages outside the active context window */
  .msg.stale { opacity: 0.5; transition: opacity 200ms ease; }
  .msg.stale:hover { opacity: 0.9; }

  /* =========================================================
     Tool calls — subtle inline-feeling lines above the agent reply.
     No border, no fill. Header is a comma-joined list of past-
     tense verbs ("Searched the web, read the file") + chevron.
     Click to expand a code-y block with raw args + result JSON.
     ========================================================= */
  .msg-tools {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    font-family: var(--sans);
    font-style: normal;
    max-width: 60ch;
  }

  .tgroup {
    /* No card chrome — just stacked text. */
    color: var(--ink-soft);
  }
  .tgroup-head {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink-soft);
    transition: color 120ms ease;
  }
  .tgroup-head:hover { color: var(--ink); }
  .tgroup-title {
    /* No truncation — let it wrap if a verb list gets long. */
    overflow-wrap: anywhere;
  }
  .tgroup-chev {
    flex-shrink: 0;
    width: 11px; height: 11px;
    color: var(--ink-ghost);
    transition: transform 160ms ease, color 120ms ease;
    margin-top: 1px;
  }
  .tgroup.open .tgroup-chev { transform: rotate(90deg); color: var(--ink-soft); }
  .tgroup.running .tgroup-chev {
    animation: tspin 1.1s linear infinite;
    color: var(--accent);
  }
  .tgroup.failed .tgroup-chev { color: #b04545; }
  @keyframes tspin { to { transform: rotate(360deg); } }

  /* Expanded body: thin left rule, mono peek per step. */
  .tgroup-body {
    display: none;
    margin-top: 8px;
    margin-left: 2px;
    padding: 2px 0 2px 14px;
    border-left: 1px solid var(--rule);
  }
  .tgroup.open .tgroup-body { display: block; }

  .tstep {
    padding: 8px 10px;
    background: var(--bg-deep);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.55;
    color: var(--ink-soft);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .tstep + .tstep { margin-top: 6px; }
  .tstep-name {
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .tstep-name .tstep-status {
    margin-left: 8px;
    font-weight: 400;
    color: var(--ink-ghost);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 9.5px;
  }
  .tstep-name .tstep-status.running { color: var(--accent); }
  .tstep-name .tstep-status.failed { color: #b04545; }
  .tstep-label {
    text-transform: uppercase;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: var(--ink-ghost);
    margin: 6px 0 2px 0;
  }

  /* =========================================================
     Touch / coarse-pointer adaptations
     When hover isn't available, replace hover-gated affordances
     with always-visible (but quiet) alternatives.
     ========================================================= */
  @media (hover: none), (pointer: coarse) {
    /* Message meta: always visible at reduced emphasis. Tapping
       a message still feels identical but the hint doesn't hide. */
    .msg-footer { opacity: 0.55; transition: none; }
    .msg:active .msg-footer { opacity: 1; }

    /* Stale messages: don't fight with touch — just dim, no hover reveal */
    .msg.stale:hover { opacity: 0.5; }
    .msg.stale:active { opacity: 0.9; }

    /* Tide line: expand tap target; stay "expressed" so the
       rail is clearly interactive. Tap scrubs; touchmove scrubs. */
    .tide-line {
      width: 28px;
      background: color-mix(in srgb, var(--bg-deep) 35%, transparent);
    }
    .tide-line .tide-day {
      background: var(--ink-mute);
    }
    .tide-line .tide-label { opacity: 0.65; }
    .tide-line .tide-label.anchor { opacity: 0.8; }
    /* Active scrubbing shows the cursor */
    .tide-line.pinned { background: color-mix(in srgb, var(--bg-deep) 55%, transparent); }
  }

  /* Composer-topic chip removed (topic-break feature gone) */
  .composer-topic-legacy-removed {
    display: none;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    padding: 0 2px;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
  }
  .composer-topic.visible { display: flex; }
  .composer-topic strong {
    font-family: var(--sans);
    font-weight: 500;
    font-style: normal;
    color: var(--ink-soft);
  }
  .composer-topic-clear {
    all: unset;
    cursor: pointer;
    color: var(--ink-ghost);
    transition: color 120ms ease;
  }
  .composer-topic-clear:hover { color: var(--ink); }
</style>

<script>
/* =========================================================
   State
   ========================================================= */
const STORAGE_KEY = 'tide-sessions-v5';
const LEGACY_KEY = 'tide-sessions-v4';

/* Sessions layer.
   { sessions: [{id, title, messages: [...]}], activeId }
   `messages` below is a live reference to the active session's messages. */
let store = loadStore();
let messages = store.sessions.find(s => s.id === store.activeId).messages;
// Pending agent switch: when the user switches agents from a session that
// already has messages, we don't create a new session immediately. Instead
// we enter a "pending" state — chat view renders empty under the new agent,
// and a real session is only created when the user sends the first message.
// Cleared by sending a message, switching sessions, or starting a +new session.
let pendingAgentId = null;

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.sessions && parsed.sessions.length) {
        if (!parsed.sessions.find(s => s.id === parsed.activeId)) {
          parsed.activeId = parsed.sessions[0].id;
        }
        return parsed;
      }
    }
  } catch(_) {}
  return seedStore();
}

function seedStore() {
  // Seed — 6 weeks of realistic chat, split across several sessions
  const now = Date.now();
  const D = 24 * 3600 * 1000;
  const H = 3600 * 1000;
  const M = 60 * 1000;

  // Session seeds — each a cluster of related messages with a clear topic.
  // Each entry: [daysAgo, hourOffset, role, text, tools?, chart?]
  const sessionSeeds = [
    {
      id: 'sess-dpa',
      title: "mercy dpa · 7.3 pushback",
      seeds: [
    [40, -7,  'you',   "reviewing the mercy dpa. they're pushing back on 7.3. what's our fallback?"],

/* =========================================================
   Rendering
   ========================================================= */
const timeline = document.getElementById('timeline');

function render() {
  timeline.innerHTML = '';
  if (pendingAgentId || messages.length === 0) {
    const intro = document.createElement('div');
    intro.className = 'intro';
    intro.innerHTML = '<div class="big">One conversation.</div>Say anything.';
    timeline.appendChild(intro);
    return;
  }

  // Group by day — insert a day marker whenever the date changes
  let lastDay = null;

  messages.forEach((m, idx) => {
    const day = dayOf(m.ts);
    if (day !== lastDay) {
      const d = document.createElement('div');
      d.className = 'day';
      d.textContent = dayLabel(m.ts);
      timeline.appendChild(d);
      lastDay = day;
    }
    const el = buildMsg(m);
    timeline.appendChild(el);
  });
}

function dayOf(ts) { return new Date(ts).toDateString(); }
function dayLabel(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'today';
  if (d.toDateString() === yesterday.toDateString()) return 'yesterday';
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
}
function timeLabel(ts) {
  const d = new Date(ts);
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m} ${ap}`;
}

function buildMsg(m) {
  const el = document.createElement('article');
  el.className = 'msg ' + m.role;
  el.dataset.id = m.id;

  // Tools — rendered before the body (agent messages only)
  if (m.role === 'agent' && Array.isArray(m.tools) && m.tools.length) {
    el.appendChild(buildTools(m.tools));
  }

  const body = document.createElement('div');
  body.className = 'msg-body';
  // Simple paragraph splitting
  body.textContent = m.text;
  el.appendChild(body);

  // Chart embed — agent-only, rendered after the text body.
  if (m.role === 'agent' && m.chart) {
    el.appendChild(buildChart(m.chart));
  }

  const footer = document.createElement('div');
  footer.className = 'msg-footer';
  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = timeLabel(m.ts);
  footer.appendChild(time);
  // Action icons. Agent messages get copy + retry; user messages get copy + edit.
  if (m.role === 'agent') {
    footer.appendChild(makeMsgAction('copy', m, el));
    footer.appendChild(makeMsgAction('retry', m, el));
  } else {
    footer.appendChild(makeMsgAction('copy', m, el));
    footer.appendChild(makeMsgAction('edit', m, el));
  }
  el.appendChild(footer);
  return el;
}

/* Build an action icon button (copy / retry / edit) for a message footer. */
const ICON_PATHS = {
  // 13×13 viewBox icons, stroked with currentColor
  copy: '<rect x="4.5" y="4.5" width="6" height="7" rx="1.2" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M2.5 8.5 L2.5 2.5 a1 1 0 0 1 1 -1 L8.5 1.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>',
  check: '<path d="M3 7 L5.5 9.5 L10 4.5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
  retry: '<path d="M11 6.5 a4.5 4.5 0 1 1 -1.3 -3.2" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M11 1.5 L11 3.5 L9 3.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
  edit: '<path d="M2.5 10.5 L2.5 8.7 L8.4 2.8 a1 1 0 0 1 1.4 0 L10.6 3.6 a1 1 0 0 1 0 1.4 L4.7 10.9 L2.9 10.9 Z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/>',
};
function makeMsgAction(kind, m, msgEl) {
  const btn = document.createElement('button');
  btn.className = 'msg-action';
  btn.type = 'button';
  btn.setAttribute('aria-label', kind);
  btn.title = kind;
  btn.innerHTML = `<svg viewBox="0 0 13 13" aria-hidden="true">${ICON_PATHS[kind]}</svg>`;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (kind === 'copy') {
      navigator.clipboard?.writeText(m.text || '').catch(() => {});
      btn.classList.add('copied');
      btn.innerHTML = `<svg viewBox="0 0 13 13" aria-hidden="true">${ICON_PATHS.check}</svg>`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 13 13" aria-hidden="true">${ICON_PATHS.copy}</svg>`;
      }, 1400);
    } else if (kind === 'retry') {
      retryAgentMessage(m);
    } else if (kind === 'edit') {
      startEditMessage(m, msgEl);
    }
  });
  return btn;
}

/* Retry: drop the agent reply (and anything after it), then re-run the
   prior user prompt as a fresh turn. */
async function retryAgentMessage(m) {
  if (m.role !== 'agent') return;
  const idx = messages.findIndex(x => x.id === m.id);
  if (idx <= 0) return;
  // Walk back to the closest preceding user message.
  let promptIdx = -1;
  for (let i = idx - 1; i >= 0; i--) {
    if (messages[i].role === 'you') { promptIdx = i; break; }
  }
  if (promptIdx < 0) return;
  const promptMsg = messages[promptIdx];
  // Truncate everything after the prompt — agent reply + any later messages.
  truncateMessagesAfter(promptIdx);
  save();
  await runAgentTurn(promptMsg.text);
}

/* Edit: swap the user message body to a contenteditable. Enter commits, Esc
   cancels. On commit, update the message text, drop everything after it,
   and re-run the agent on the new text. */
function startEditMessage(m, msgEl) {
  if (m.role !== 'you') return;
  const body = msgEl.querySelector('.msg-body');
  if (!body || body.isContentEditable) return;
  const original = m.text;
  body.setAttribute('contenteditable', 'plaintext-only');
  body.classList.add('editing');
  body.focus();
  // place caret at end
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(body);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const next = body.textContent.trim();
    cleanup();
    if (next && next !== original) {
      m.text = next;
      m.ts = Date.now();
      // Drop everything after this user message and re-run the agent.
      const idx = messages.findIndex(x => x.id === m.id);
      if (idx >= 0) truncateMessagesAfter(idx);
      save();
      // Update rendered timestamp on the user message in place.
      const time = msgEl.querySelector('.msg-time');
      if (time) time.textContent = timeLabel(m.ts);
      body.textContent = next;
      runAgentTurn(next);
    } else {
      body.textContent = original;
    }
  }
  function cancel() {
    if (committed) return;
    committed = true;
    body.textContent = original;
    cleanup();
  }
  function cleanup() {
    body.removeAttribute('contenteditable');
    body.classList.remove('editing');
    body.removeEventListener('keydown', onKey);
    body.removeEventListener('blur', onBlur);
  }
  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  }
  function onBlur() { commit(); }
  body.addEventListener('keydown', onKey);
  body.addEventListener('blur', onBlur);
}

/* Drop messages[idx+1..end] from the array AND from the DOM. */
function truncateMessagesAfter(idx) {
  const removed = messages.splice(idx + 1);
  for (const r of removed) {
    const el = timeline.querySelector(`.msg[data-id="${r.id}"]`);
    if (el) el.remove();
  }
  // Also drop any orphan thinking indicators.
  timeline.querySelectorAll('.thinking').forEach(t => t.remove());
}

/* =========================================================
   Tool calls — render as one-or-more grouped "tasks".
   Subtle inline style: header is a comma-joined list of
   past-tense verbs ("Searched the web, read the file") plus
   a small chevron. No card chrome. Click to peek raw JSON.
   ========================================================= */
function normalizeTools(tools) {
  if (!tools || !tools.length) return [];
  const allGrouped = tools.every(t => t && Array.isArray(t.tools));
  if (allGrouped) return tools;
  return [{ tools }];
}

/* Past-tense verb phrase per tool (no targets, no args). */
function toolVerb(name) {
  const map = {
    'email.search':       'searched email',
    'email.read':         'read the thread',
    'email.send':         'sent a reply',
    'calendar.read':      'checked your calendar',
    'calendar.create':    'held time on your calendar',
    'slack.search':       'searched slack',
    'drive.find':         'found a file',
    'drive.read':         'read the file',
    'drive.write':        'updated the file',
    'keynote.read_slide': 'read the slide',
    'keynote.analyze':    'analyzed the deck',
    'web.search':         'searched the web',
    'web.read':           'read the page',
    'flights.search':     'priced flights',
    'finance.read':       'pulled numbers',
    'linear.search':      'searched linear',
    'linear.create':      'opened a ticket',
  };
  return map[name] || (name.split('.')[1] || 'ran').replace(/_/g, ' ');
}

/* Build the comma-joined header phrase, dedupe adjacent identical
   verbs ("read the file, read the file" → "read the file"). First
   verb is sentence-cased, rest stay lowercase. */
function groupHeaderPhrase(group) {
  const verbs = group.tools.map(t => toolVerb(t.name));
  const dedup = [];
  for (const v of verbs) if (dedup[dedup.length - 1] !== v) dedup.push(v);
  if (!dedup.length) return 'thinking';
  // Sentence-case the first verb only.
  dedup[0] = dedup[0].charAt(0).toUpperCase() + dedup[0].slice(1);
  return dedup.join(', ');
}

/* Group-level status: running > failed > done. */
function groupStatus(g) {
  const ts = g.tools;
  if (ts.some(t => t.status === 'running')) return 'running';
  if (ts.some(t => t.status === 'failed')) return 'failed';
  return 'done';
}

function buildTools(tools) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-tools';
  const groups = normalizeTools(tools);

  groups.forEach(g => {
    const status = groupStatus(g);
    const groupEl = document.createElement('div');
    groupEl.className = 'tgroup ' + status;

    const head = document.createElement('div');
    head.className = 'tgroup-head';
    head.innerHTML = `
      <span class="tgroup-title"></span>
      <svg class="tgroup-chev" viewBox="0 0 11 11" aria-hidden="true">
        <path d="M3.5 2 L7.5 5.5 L3.5 9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    `;
    head.querySelector('.tgroup-title').textContent = groupHeaderPhrase(g);
    head.addEventListener('click', () => groupEl.classList.toggle('open'));
    groupEl.appendChild(head);

    // Body: code-y JSON peek for each step.
    const body = document.createElement('div');
    body.className = 'tgroup-body';
    g.tools.forEach(t => {
      const step = document.createElement('div');
      step.className = 'tstep';

      const name = document.createElement('div');
      name.className = 'tstep-name';
      name.innerHTML = `${escapeHtml(t.name)}<span class="tstep-status ${t.status || ''}">${t.status || 'done'}</span>`;
      step.appendChild(name);

      const argsLabel = document.createElement('div');
      argsLabel.className = 'tstep-label';
      argsLabel.textContent = 'args';
      step.appendChild(argsLabel);
      const argsBody = document.createElement('div');
      argsBody.textContent = JSON.stringify(t.args || {}, null, 2);
      step.appendChild(argsBody);

      if (t.status === 'failed') {
        const errLabel = document.createElement('div');
        errLabel.className = 'tstep-label';
        errLabel.textContent = 'error';
        step.appendChild(errLabel);
        const errBody = document.createElement('div');
        errBody.textContent = t.error || 'failed';
        step.appendChild(errBody);
      } else if (t.status !== 'running' && t.result != null) {
        const resLabel = document.createElement('div');
        resLabel.className = 'tstep-label';
        resLabel.textContent = 'result';
        step.appendChild(resLabel);
        const resBody = document.createElement('div');
        resBody.textContent = typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2);
        step.appendChild(resBody);
      }

      body.appendChild(step);
    });
    groupEl.appendChild(body);
    wrap.appendChild(groupEl);
  });
  return wrap;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

/* =========================================================
   CHART EMBED — builds a <figure> containing a sandboxed iframe
   whose srcdoc is a self-contained HTML chart that inherits
   Tide's tokens (passed in as CSS custom properties).

   The chart is an SVG rendered in pure HTML; no scripts run in
   the iframe (sandbox=""). This keeps arbitrary model output
   safe while still letting it control layout, colors, labels.
   ========================================================= */
function buildChart(chart) {
  const fig = document.createElement('figure');
  fig.className = 'chart-embed loading';

  const frame = document.createElement('iframe');
  frame.className = 'chart-embed-frame';
  frame.setAttribute('sandbox', ''); // no scripts, no same-origin
  frame.setAttribute('loading', 'lazy');
  frame.setAttribute('title', chart.title || 'Chart');
  // Height per chart type
  const h = chart.type === 'spark' ? 80 : chart.type === 'bars' ? 220 : 200;
  frame.style.height = h + 'px';
  frame.srcdoc = chartDoc(chart, tokensFromPage());

  // Reveal when loaded
  frame.addEventListener('load', () => fig.classList.remove('loading'));
  // Safety: reveal after 1.2s even if load fires oddly
  setTimeout(() => fig.classList.remove('loading'), 1200);

  fig.appendChild(frame);

  // Caption below: label · meta, plus hover actions
  const cap = document.createElement('figcaption');
  cap.className = 'chart-embed-caption';
  const left = document.createElement('span');
  left.className = 'label';
  left.textContent = (chart.title || 'chart').toLowerCase();
  cap.appendChild(left);
  const right = document.createElement('span');
  right.className = 'meta';
  right.textContent = chart.meta || '';
  cap.appendChild(right);
  fig.appendChild(cap);

  return fig;
}

/* Read Tide's current design tokens so the iframe can match. */
function tokensFromPage() {
  const cs = getComputedStyle(document.body);
  const get = (k) => cs.getPropertyValue(k).trim();
  return {
    bg:       get('--bg')       || '#fbfbf7',
    ink:      get('--ink')      || '#1d1d1a',
    inkSoft:  get('--ink-soft') || '#4a4a45',
    inkMute:  get('--ink-mute') || '#7a7a72',
    inkGhost: get('--ink-ghost')|| '#aba99f',
    rule:     get('--rule')     || '#dfded4',
    accent:   get('--accent')   || '#8b2e1f',
    youWash:  get('--you-wash') || '#ecede6',
    sans:     get('--sans')     || "'IBM Plex Sans', system-ui, sans-serif",
    serif:    get('--sans')     || "'IBM Plex Sans', system-ui, sans-serif",
    mono:     get('--mono')     || "'IBM Plex Mono', ui-monospace, monospace",
  };
}

/* Build the srcdoc HTML for the iframe. */
function chartDoc(chart, t) {
  const svg = renderChartSVG(chart, t);
  return `<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: ${t.bg}; color: ${t.ink};
    font-family: ${t.sans}; height: 100%; }
  .wrap { padding: 14px 14px 10px; box-sizing: border-box; height: 100%; }
  .hd { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .hd .t { font-family: ${t.sans}; font-size: 13px; font-weight: 500; font-style: normal; color: ${t.ink}; letter-spacing: -0.005em; }
  .hd .v { font-family: ${t.mono}; font-size: 10.5px; color: ${t.inkMute}; letter-spacing: 0.04em; text-transform: uppercase; }
  .chart { position: relative; width: 100%; height: calc(100% - ${(chart.title || chart.big) ? '30px' : '0px'} - ${chart.legend ? '20px' : '0px'}); }
  .chart svg { width: 100%; height: 100%; display: block; }
  .axis { stroke: ${t.inkGhost}; stroke-width: 0.5; }
  .grid { stroke: ${t.inkGhost}; stroke-width: 0.4; stroke-dasharray: 2 4; opacity: 0.5; }
  .line { fill: none; stroke: ${t.accent}; stroke-width: 1.4; stroke-linejoin: round; }
  .area { fill: ${t.accent}; opacity: 0.08; }
  .dot  { fill: ${t.accent}; }
  .bar  { fill: ${t.accent}; opacity: 0.75; }
  .bar.muted { fill: ${t.inkGhost}; opacity: 0.5; }
  .lbl  { fill: ${t.inkMute}; font-family: ${t.mono}; font-size: 9.5px; letter-spacing: 0.04em; text-transform: uppercase; }
  .val  { fill: ${t.ink}; font-family: ${t.mono}; font-size: 10px; font-weight: 500; }
  .legend { font-family: ${t.mono}; font-size: 10px; color: ${t.inkMute}; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 6px; }
  .swatch { display: inline-block; width: 8px; height: 2px; background: ${t.accent}; margin-right: 5px; vertical-align: middle; }
</style></head>
<body><div class="wrap">
  ${(chart.title || chart.big) ? `<div class="hd">
    <span class="t">${chart.title || ''}</span>
    <span class="v">${chart.big || ''}</span>
  </div>` : ''}
  <div class="chart">${svg}</div>
  ${chart.legend ? `<div class="legend"><span class="swatch"></span>${chart.legend}</div>` : ''}
</div></body></html>`;
}

/* SVG renderers for chart types. Uses viewBox-based layout so
   the chart scales with the iframe size. */
function renderChartSVG(chart, t) {
  const W = 560, H = chart.type === 'spark' ? 60 : 180;
  if (chart.type === 'line' || !chart.type) return renderLine(chart, W, H, t);
  if (chart.type === 'bars') return renderBars(chart, W, H, t);
  if (chart.type === 'spark') return renderSpark(chart, W, H, t);
  return '';
}

function renderLine(chart, W, H, t) {
  const data = chart.data || [];
  const pad = { l: 34, r: 14, t: 10, b: 26 };
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const vals = data.map(d => d.v);
  const min = chart.min != null ? chart.min : Math.min(...vals, 0);
  const max = chart.max != null ? chart.max : Math.max(...vals);
  const span = max - min || 1;
  const x = (i) => pad.l + (iw * i) / Math.max(data.length - 1, 1);
  const y = (v) => pad.t + ih - ((v - min) / span) * ih;
  const pts = data.map((d, i) => `${x(i)},${y(d.v)}`).join(' ');
  const area = `M${x(0)},${pad.t + ih} L${pts.replace(/ /g, ' L')} L${x(data.length - 1)},${pad.t + ih} Z`;
  // y-axis ticks
  const ticks = [min, min + span / 2, max].map(v => {
    const yy = y(v);
    const lbl = Number.isInteger(v) ? v : v.toFixed(1);
    return `<line class="grid" x1="${pad.l}" x2="${W - pad.r}" y1="${yy}" y2="${yy}"/>
      <text class="lbl" x="${pad.l - 6}" y="${yy + 3}" text-anchor="end">${lbl}</text>`;
  }).join('');
  // Threshold line (optional, from chart.threshold)
  const thresh = chart.threshold != null ? (() => {
    const yy = y(chart.threshold);
    return `<line x1="${pad.l}" x2="${W - pad.r}" y1="${yy}" y2="${yy}" stroke="${t.accent}" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
      <text class="lbl" x="${W - pad.r}" y="${yy - 4}" text-anchor="end" fill="${t.accent}">threshold ${chart.threshold}</text>`;
  })() : '';
  const xlabels = data.map((d, i) => {
    if (!d.label) return '';
    const anchor = i === 0 ? 'start' : i === data.length - 1 ? 'end' : 'middle';
    return `<text class="lbl" x="${x(i)}" y="${H - 8}" text-anchor="${anchor}">${d.label}</text>`;
  }).join('');
  const dots = data.map((d, i) => `<circle class="dot" cx="${x(i)}" cy="${y(d.v)}" r="${i === data.length - 1 ? 2.8 : 1.4}"/>`).join('');
  const lastVal = `<text class="val" x="${W - pad.r}" y="${y(data[data.length - 1].v) - 6}" text-anchor="end">${data[data.length - 1].v}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${ticks}
    <path class="area" d="${area}"/>
    <polyline class="line" points="${pts}"/>
    ${thresh}
    ${dots}
    ${xlabels}
    ${lastVal}
  </svg>`;
}

function renderBars(chart, W, H, t) {
  const data = chart.data || [];
  const pad = { l: 38, r: 14, t: 10, b: 26 };
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const vals = data.map(d => d.v);
  const dmax = Math.max(...vals, 0);
  const dmin = Math.min(...vals, 0);
  const span = (dmax - dmin) || 1;
  const zeroY = pad.t + ih - ((0 - dmin) / span) * ih;
  const bw = iw / data.length * 0.68;
  const slotW = iw / data.length;
  const ticks = [dmin, 0, dmax].filter((v, i, a) => a.indexOf(v) === i).map(v => {
    const yy = pad.t + ih - ((v - dmin) / span) * ih;
    return `<line class="grid" x1="${pad.l}" x2="${W - pad.r}" y1="${yy}" y2="${yy}"/>
      <text class="lbl" x="${pad.l - 6}" y="${yy + 3}" text-anchor="end">${v > 0 ? '+' : ''}${Math.round(v)}%</text>`;
  }).join('');
  const bars = data.map((d, i) => {
    const x = pad.l + slotW * i + (slotW - bw) / 2;
    const v = d.v;
    const vy = pad.t + ih - ((v - dmin) / span) * ih;
    const y = Math.min(vy, zeroY);
    const h = Math.abs(vy - zeroY);
    const cls = d.muted ? 'bar muted' : 'bar';
    return `<rect class="${cls}" x="${x}" y="${y}" width="${bw}" height="${h}" rx="1"/>
      <text class="lbl" x="${x + bw / 2}" y="${H - 8}" text-anchor="middle">${d.label || ''}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    ${ticks}${bars}
  </svg>`;
}

function renderSpark(chart, W, H, t) {
  const data = chart.data || [];
  const vals = data.map(d => d.v);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const span = max - min || 1;
  const x = (i) => (W * i) / Math.max(data.length - 1, 1);
  const y = (v) => H - ((v - min) / span) * (H - 8) - 4;
  const pts = data.map((d, i) => `${x(i)},${y(d.v)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline class="line" points="${pts}"/>
    <circle class="dot" cx="${x(data.length - 1)}" cy="${y(vals[vals.length - 1])}" r="2.2"/>
  </svg>`;
}

function formatToolArgs(args) {
  if (!args) return '';
  if (typeof args === 'string') return args;
  const parts = Object.entries(args).map(([k, v]) => {
    const vs = typeof v === 'string' ? v : JSON.stringify(v);
    return vs.length > 40 ? `${k}=${vs.slice(0,40)}…` : `${k}=${vs}`;
  });
  return parts.join(' · ');
}

/* =========================================================
   Composer
   ========================================================= */
const input = document.getElementById('composerInput');
const sendBtn = document.getElementById('sendBtn');

// Attach (+) menu
