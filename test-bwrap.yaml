apiVersion: v1
kind: Pod
metadata:
  name: bwrap-probe-userns
spec:
  restartPolicy: Never
  hostUsers: false
  containers:
  - name: probe
    image: debian:stable-slim
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      apt-get update -qq && apt-get install -y -qq bubblewrap >/dev/null

      echo "=== uid/gid map inside pod ==="
      cat /proc/self/uid_map
      cat /proc/self/gid_map

      echo "=== test 1: minimal unshare-all ==="
      bwrap --unshare-all --ro-bind / / --tmpfs /tmp --die-with-parent /bin/true
      echo "exit=$?"

      echo "=== test 2: full namespace + ns inodes ==="
      bwrap --unshare-all --ro-bind / / --tmpfs /tmp \
            --proc /proc --dev /dev --chdir / --new-session \
            /bin/sh -c 'id; ls -l /proc/self/ns'
      echo "exit=$?"

      echo "=== outer container ns for comparison ==="
      ls -l /proc/self/ns
