name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # needed for affected-package detection (pnpm "...[base-sha]") on PRs
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      # Tests: affected packages + dependents on PRs (fast feedback); full suite on
      # push to main (cross-package backstop — a shared-table break only shows on the
      # full run; auto-merge relies on this main gate, see auto-ship merge queue).
      - name: Test (affected packages + dependents)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # '!{.}' excludes the workspace ROOT project — its `test` script is the full
          # recursive `pnpm -r run test`, which any root-level file change would otherwise trigger.
          if pnpm --filter "...[$BASE_SHA]" --filter '!{.}' list --depth -1 --parseable | grep -q . ; then
            pnpm --filter "...[$BASE_SHA]" --filter '!{.}' run test
          else
            echo "No affected workspace packages — package tests skipped (typecheck + lint already ran; full suite runs on merge to main)."
          fi
          pnpm test:eslint-rules
      - name: Test (full suite)
        if: github.event_name != 'pull_request'
        run: pnpm test
      - run: pnpm audit --audit-level moderate

  # Renders the Helm chart and runs its render-time guard suite. Without this
  # lane those guards (single-replica chat guard, gitServer.storage-required,
  # workspace.backend wiring, terminationGracePeriodSeconds floor) only execute
  # where helm happens to be on PATH — i.e. never in the test job above, which
  # ships no helm. The chart-render vitest suite `describe.skip`s when helm is
  # absent, so a green CI run did NOT prove the guards ran. Here we install a
  # pinned helm and set AX_REQUIRE_HELM=1 so a missing helm is a HARD FAILURE,
  # not a silent skip. Scoped to chart-relevant paths (affected-package
  # philosophy): the heavy steps only run when chart/values/preset/CI files
  # change. The workflow file itself is in scope so changes to THIS lane are
  # exercised by the PR that makes them.
  helm-render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # need the base commit to diff changed paths on PRs
      - name: Detect chart-relevant changes
        id: changes
        env:
          # Routed through env (not inlined into the script) per the workflow-
          # injection guidance — both are GitHub-controlled, not user input,
          # but the env-var convention keeps the script free of `${{ }}`.
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # On push to main, always render. On a PR, render only when a
          # chart/values/preset file or this workflow changed — the chart
          # render depends on deploy/charts/** (the chart) and
          # presets/k8s/src/index.ts (env-shape.test.ts scans it for the
          # host Deployment's env contract).
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Push event — rendering chart."
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA"...HEAD)
          if printf '%s\n' "$changed" | grep -Eq '^(deploy/charts/|presets/k8s/|\.github/workflows/ci\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Chart-relevant files changed — rendering chart."
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No chart-relevant changes — skipping helm render."
          fi
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: steps.changes.outputs.relevant == 'true'
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.changes.outputs.relevant == 'true'
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install helm (pinned)
        if: steps.changes.outputs.relevant == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.21.0
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.relevant == 'true'
      - name: Render chart + run guard suite (helm required)
        if: steps.changes.outputs.relevant == 'true'
        env:
          # Flip the chart-render suites from "skip when helm absent" to
          # "fail when helm absent" — this lane exists to prove the guards run.
          AX_REQUIRE_HELM: '1'
        run: pnpm --filter @ax/chart-tests test

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: >
          semgrep
          --config .semgrep.yml
          --config .semgrep-ci.yml
          --config p/security-audit
          --config p/nodejs
          --config p/typescript
          --error
          packages/

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ignore
