name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # needed for affected-package detection (pnpm "...[base-sha]") on PRs
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      # Tests: affected packages + dependents on PRs (fast feedback); full suite on
      # push to main (cross-package backstop — a shared-table break only shows on the
      # full run; auto-merge relies on this main gate, see dag-ship merge queue).
      - name: Test (affected packages + dependents)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # '!{.}' excludes the workspace ROOT project — its `test` script is the full
          # recursive `pnpm -r run test`, which any root-level file change would otherwise trigger.
          if pnpm --filter "...[$BASE_SHA]" --filter '!{.}' list --depth -1 --parseable | grep -q . ; then
            pnpm --filter "...[$BASE_SHA]" --filter '!{.}' run test
          else
            echo "No affected workspace packages — package tests skipped (typecheck + lint already ran; full suite runs on merge to main)."
          fi
          pnpm test:eslint-rules
      - name: Test (full suite)
        if: github.event_name != 'pull_request'
        run: pnpm test
      - run: pnpm audit --audit-level moderate

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: >
          semgrep
          --config .semgrep.yml
          --config .semgrep-ci.yml
          --config p/security-audit
          --config p/nodejs
          --config p/typescript
          --error
          packages/

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ignore
