# ax-next Helm chart — defaults.
#
# This is the v2 deploy story for k8s mode. Single-replica host (HPA arrives
# in a follow-up PR), runner pods spawned in `namespace.runner` per session,
# tight RBAC + NetworkPolicies. We pin everything we can; placeholders are
# explicitly empty so `helm install` fails loudly rather than booting with a
# bad default.

nameOverride: ""
fullnameOverride: ""

# ─── Image ────────────────────────────────────────────────────────
# The host pod and the runner pod share the same image (bundled-runner
# binaries pattern). The runner image string is what the host plugin
# passes to k8s when creating runner pods.
image:
  repository: ax-next/agent
  tag: ""             # empty → Chart.appVersion
  pullPolicy: IfNotPresent
imagePullSecrets: []

# ─── Storage-tier image (Phase 1 of workspace redesign) ───
# Separate image from host/runner because the storage tier ships with the
# git binary; host/runner stay slim. Built from container/git-server/Dockerfile.
gitServerImage:
  repository: ax-next/git-server
  tag: ""             # empty → Chart.appVersion
  pullPolicy: IfNotPresent

# ─── Replicas ─────────────────────────────────────────────────────
# Single replica ONLY, and the chart enforces it: `helm template` FAILS for
# replicas > 1 (see ax-next.validateHostReplicas in _helpers.tpl). The web
# chat surface streams SSE over an in-process per-reqId chunk buffer
# (@ax/channel-web), and the host PVC is RWO with a Recreate rollout — neither
# survives a second replica. Multi-replica chat is gated on a distributed
# stream broker (a tracked follow-up); don't bump this until that ships.
replicas: 1

# ─── Namespace for runner pods ────────────────────────────────────
# Runner pods are created in this namespace by `@ax/sandbox-k8s`.
# This namespace is NOT created by the chart today — operators create
# it ahead of install. The host pod's RBAC binding is scoped to it.
namespace:
  runner: ax-next-runners

# ─── Host pod ────────────────────────────────────────────────────
host:
  ports:
    # @ax/ipc-http listener — runner pods reach back to the host here.
    # NOT public traffic. NetworkPolicy + the runner pod's own egress
    # ACL are what bound this; never expose via Ingress.
    ipc: 8080
    # @ax/http-server listener — public surface. Carries /chat + /health
    # (registered by `serve` via http:register-route — see issue #39),
    # plus /admin/*, /auth/*, /api/chat/* (channel-web), and the future
    # admin UI bundle (Week 10–12). This is where Ingress points.
    publicHttp: 9090
  # Service port that runner pods connect to for IPC. The host Service
  # maps :ipcServicePort → :ports.ipc (containerPort). Decoupled from
  # ports.ipc so operators can front the host with the conventional :80
  # while the container listens on :8080.
  ipcServicePort: 80
  # Service port for the public listener. Maps :publicHttpServicePort →
  # :ports.publicHttp. Default is the conventional :80 — but ipc already
  # owns :80 on the same Service, so we pick :9090 here too. Operators
  # fronting with an Ingress override this with whatever port the
  # Ingress controller expects.
  publicHttpServicePort: 9090
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  readinessProbe:
    httpGet:
      path: /health
      port: public-http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: public-http
    initialDelaySeconds: 10
    periodSeconds: 30
  terminationGracePeriodSeconds: 30
  # `args` (not `command`) so the image's ENTRYPOINT (tini) stays as PID 1.
  # In k8s, `command` replaces ENTRYPOINT entirely; `args` only replaces CMD.
  # The deploy tree lives at /opt/ax-next/host inside container/agent/Dockerfile;
  # dist/main.js is the cli binary IIFE that dispatches subcommands.
  #
  # No more --port: the standalone listener is gone (issue #39). The IPC
  # listener reads BIND_HOST/PORT, the public listener reads
  # AX_HTTP_HOST/AX_HTTP_PORT — both stamped by the deployment template.
  args: ["node", "/opt/ax-next/host/dist/main.js", "serve"]
  env: []

# ─── Workspace persistence ───────────────────────────────────────
# `local` (default): the host's `@ax/workspace-git` writes directly to
# the PVC mounted inside the host pod at workspace.mountPath. Single-
# replica only — two hosts mounting the same RWO PVC would race for the
# same bare repo.
# `git-protocol`: the host's `@ax/workspace-git-server` plugin speaks
# smart-HTTP + REST to the dedicated git-server StatefulSet via its
# ClusterIP Service. Multi-replica capable; sharding is currently deferred
# (replicas: 1) but the storage tier is a StatefulSet so future scale-out
# doesn't change the chart shape. When `git-protocol`, the operator MUST
# also set `gitServer.enabled=true` (the chart fails fast at template time
# if missing).
workspace:
  backend: local         # local | git-protocol
  storage: 10Gi
  storageClassName: ""   # empty → cluster default
  accessMode: ReadWriteOnce
  mountPath: /var/lib/ax-next/workspaces

# ─── Git-server pod (workspace.backend: git-protocol only) ────────
# Dedicated StatefulSet that owns the bare git repos on per-ordinal PVCs.
# Every host replica talks to it for workspace ops. The earlier all-in-one
# Deployment (served by `@ax/workspace-git-http`) was retired 2026-05-04;
# this StatefulSet is the only tier now.
gitServer:
  enabled: false         # set true when workspace.backend == "git-protocol"
  # Number of storage-tier shards. Each shard is its own StatefulSet ordinal
  # with its own PVC. Pick at install time; changing it later requires
  # manual workspace migration (drain → rsync bare repos → flip traffic).
  shards: 1
  port: 7780
  service:
    port: 7780
  storage: 10Gi
  storageClassName: ""   # empty → cluster default
  accessMode: ReadWriteOnce
  mountPath: /var/lib/ax-next/repo
  # Auth token: if empty, the chart generates a 48-char random token at
  # install time via the lookup-or-generate pattern. Operators can override
  # for deterministic deploys (e.g., GitOps).
  auth:
    token: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  terminationGracePeriodSeconds: 60   # gives in-flight pushes time to drain
  readinessProbe:
    httpGet:
      path: /healthz
      port: git
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /healthz
      port: git
    initialDelaySeconds: 10
    periodSeconds: 30

# ─── Blob store (out-of-git design Part A) ───────────────────────
# The content-addressed blob:* substrate (attachments, artifacts, skill
# bundles). Exactly ONE backend registers blob:* per deployment — mirrors
# the workspace local/git-protocol and storage sqlite/postgres splits.
#
#   - `fs` (default): @ax/blob-store-fs writes content-addressed files on
#     the host PVC. Single-replica only (RWO PVC), cheapest, zero new deps.
#     `root` defaults to a sibling dir on the workspace PVC.
#   - `s3`: @ax/blob-store-s3 talks to one S3-compatible bucket. Multi-
#     replica-safe. Dev/test: point at the in-cluster MinIO (set
#     `minio.enabled=true` and `blob.backend=s3`; see kind-dev-values.yaml).
#     PROD (GCS, the likely GKE home): set
#       blob.backend: s3
#       blob.s3.bucket: <your-gcs-bucket>
#       blob.s3.endpoint: https://storage.googleapis.com
#       blob.s3.region: <bucket-region>
#     and bind the host ServiceAccount to a GCP service account via Workload
#     Identity (annotate serviceAccount; see SECURITY.md). DO NOT set
#     accessKeyId/secretAccessKey in prod — leaving them empty makes the SDK
#     use Workload Identity / the metadata server, so there are NO static
#     keys in the tree. AWS S3 / R2 work the same way (their endpoint +
#     forcePathStyle:false for AWS proper).
blob:
  backend: fs            # fs | s3
  fs:
    # Empty → preset derives <workspace.mountPath>/blobs (a sibling dir on
    # the host PVC for the local workspace backend).
    root: ""
  s3:
    bucket: ""           # required when backend=s3 AND minio.enabled=false
    endpoint: ""         # MinIO Service URL (auto when minio.enabled) / GCS / AWS / R2
    region: "us-east-1"  # signer needs a value even for non-AWS endpoints
    forcePathStyle: true # MinIO + GCS need path-style; set false for AWS S3 proper
    keyPrefix: ""        # optional namespace within the bucket
    # accessKeyId / secretAccessKey are DEV / MinIO ONLY and live in a
    # Secret, never here. Leave UNSET in prod so Workload Identity supplies
    # short-lived creds. (When minio.enabled, the chart wires the MinIO
    # Secret's keys automatically — you don't set these.)

# ─── MinIO (dev/test blob backend — kind only) ───────────────────
# A minimal single-replica MinIO Deployment for dev parity with prod object
# storage. emptyDir-backed (NOT durable — restarts lose blobs); this is a
# test fixture, not a production store. OFF by default; kind-dev-values.yaml
# flips it on alongside blob.backend=s3.
#
# Root credentials live in a Secret (random-generated, lookup-stable) and are
# wired into BOTH the MinIO server and the host's blob-store-s3 client — never
# committed. Production uses GCS+Workload-Identity instead and leaves this off.
minio:
  enabled: false
  image:
    # Pin the MinIO server image. Bump deliberately.
    repository: quay.io/minio/minio
    tag: RELEASE.2025-04-08T15-41-24Z
  # mc (MinIO client) image used by the one-shot bucket-create Job.
  mcImage:
    repository: quay.io/minio/mc
    tag: RELEASE.2025-04-08T15-39-49Z
  service:
    port: 9000
  # Bucket the host's blob-store-s3 client reads/writes. The bucket-create
  # Job provisions it at install. Also wired into AX_BLOB_S3_BUCKET.
  bucket: ax-blobs
  storage: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  auth:
    # Root user/password for MinIO + the host's S3 client. Empty password →
    # the chart generates a random one (lookup-stable across upgrades).
    rootUser: ax-minio
    rootPassword: ""

# ─── Runner pod runtime ──────────────────────────────────────────
# `runtimeClassName` defaults to gvisor — the sandbox-k8s plugin's
# threat model assumes it. Override to "" for clusters without gVisor
# (you'll get a loud warning at host pod boot from the plugin).
sandbox:
  runtimeClassName: gvisor
  # Node-filesystem path that the host pod and every runner pod both
  # mount at /var/run/ax. When set, the credential-proxy's Unix socket
  # + MITM CA cert live here so runner pods can dial the proxy. When
  # empty (the default), the host pod uses an emptyDir for the socket
  # and runner pods CANNOT reach the proxy — the runner will crash at
  # boot with `missing AX_PROXY_*`. Single-node / kind-only posture.
  # Production should switch the proxy to TCP listen mode instead; see
  # SECURITY.md.
  proxySocketHostPath: ""

# ─── PostgreSQL ──────────────────────────────────────────────────
# Two modes:
#   - external: false (default for kind-dev) → use the embedded subchart
#     (Bitnami postgresql). Subchart values flow through `postgresql:`.
#   - external: true → operator provides DATABASE_URL via an existing
#     Secret. Set `postgres.external.existingSecret` to its name.
#
# Single source of truth for embedded auth: `postgresql.auth.*` below.
# The Bitnami subchart owns those keys, so we don't duplicate them
# under `postgres.embedded.auth.*`. The host pod's DSN-building template
# and the init job both read from `postgresql.auth.*` so subchart and
# host stay in lockstep when an operator overrides them.
postgres:
  external:
    enabled: false
    existingSecret: ""
    secretKey: url
  embedded:
    enabled: true
    # Auth lives under `postgresql.auth.*` (Bitnami subchart) — see below.

# Subchart values — passed through to bitnami/postgresql when embedded
# is enabled. Keep this intentionally minimal; operators who want the
# full surface should fork the chart or use external mode.
#
# `postgresql.auth.{database,username}` is the single source of truth
# for the embedded postgres credentials. The host pod's DATABASE_URL and
# the schema-init job both read these values, so overriding them here
# flows through to both sides automatically.
postgresql:
  # Bitnami moved most of its images from `bitnami/*` to `bitnamilegacy/*`
  # in late 2025 — the old paths now 404 on Docker Hub. Pin to the legacy
  # mirror so fresh installs Just Work. Consumers wanting the new bitnami
  # premium catalog can override registry/repository at install time.
  # Tag matches v1 ax for consistency.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  auth:
    database: ax_next
    username: ax_next
    # postgresPassword + password are auto-generated; we read them from
    # the subchart's Secret (`<release>-postgresql`) in the init job.
  primary:
    persistence:
      size: 10Gi

# ─── Credentials & API keys ──────────────────────────────────────
# `AX_CREDENTIALS_KEY` is required at install — encrypts secrets at
# rest. Operators provide via:
#   --set credentials.key=$(openssl rand -base64 32)
# (See packages/credentials/SECURITY.md for the format details.)
credentials:
  key: ""
  admin:
    # When true, the host pod loads @ax/credentials-admin-routes which
    # mounts:
    #   /admin/credentials*    — admin-only CRUD (full scope axis)
    #   /settings/credentials* — per-user CRUD (scope='user', actor-bound)
    #
    # On by default since the channel-web Settings UI (Provider keys +
    # Model config tabs) depends on these routes. Without them, those
    # tabs hit static-files's SPA fallback, get HTML where they expect
    # JSON, and surface a parser error to the user. Flip off only if
    # you're shipping a deployment that intentionally hides the admin
    # surface (and a custom UI that doesn't reach for /admin/credentials*).
    enabled: true

# Anthropic API key — OPTIONAL. The first-run wizard collects an API key
# from the operator and stores it in the credentials table; the chat
# orchestrator reads from there at runtime. This env-var path is the
# bottom-of-precedence fallback (and the gate that enables auto-titling on
# the host pod). Set it only if you want a host-wide shared key in env, or
# if you want auto-titling without going through the admin UI.
#
# When set, the secret is lookup-stable: an upgrade that doesn't re-pass
# `--set anthropic.apiKey=...` keeps the existing value.
anthropic:
  apiKey: ""

# ─── Auto-titling ─────────────────────────────────────────────────
# When `anthropic.apiKey` is set, the host pod loads
# @ax/conversation-titles and writes a short title to each
# conversation after its first assistant turn (ifNull: true, never
# clobbers a user rename). When unset, titles stay null.
#
# `model` uses the `<provider>/<model-id>` convention. Today's only
# provider is `anthropic`. Future providers slot in by registering
# `llm:call:<provider>` from a sibling plugin.
titles:
  # Title-LLM model. Default: cheapest current Claude. Override for
  # benchmarking or to follow a model deprecation.
  #
  # NOTE: this default must stay in lockstep with `DEFAULT_TITLE_MODEL`
  # exported from @ax/conversation-titles — helm can't import TS, so
  # the operator-facing default is duplicated here by hand.
  model: anthropic/claude-haiku-4-5-20251001

# ─── Channel-web (browser SPA) ───────────────────────────────────
# When enabled, the host pod's @ax/static-files plugin serves the
# channel-web React bundle on otherwise-unmatched paths. The image's
# build pipeline already produces `dist-web/` (vite output) inside the
# channel-web package, so flipping this on is just stamping the env
# var. Disable for headless / API-only deploys.
channelWeb:
  enabled: true
  # In-image path of the SPA bundle. The agent Dockerfile's runtime stage
  # copies channel-web/dist-web here directly, so this path is stable and
  # doesn't depend on pnpm's internal node_modules layout. Operators who
  # repackage the image with a different layout can override.
  bundleDir: /opt/ax-next/host/web

# ─── HTTP-server config (public surface — issue #39) ─────────────
# `cookieKey` signs auth-better's session cookie. 32 bytes; provide
# via `--set http.cookieKey=$(openssl rand -hex 32)` (or 44 base64
# chars). When empty AND no existing Secret carries one, the chart
# falls through to `required` and `helm install` fails loudly.
# Like `credentials.key`, the Secret is `lookup`-stable — `helm
# upgrade` keeps the existing key rather than rotating it (rotating
# invalidates every active session cookie).
#
# `allowedOrigins` is the exact-match CSRF allow-list for state-
# changing methods. Empty allows only X-Requested-With: ax-admin
# callers (the http-server logs a warn when empty unless
# AX_HTTP_ALLOW_NO_ORIGINS=1 is set on the pod).
http:
  cookieKey: ""
  allowedOrigins: []

# ----- Onboarding ------------------------------------------------------
# First-run wizard. The plugin auto-generates a bootstrap token at first
# boot if `bootstrapToken` is empty AND no row exists in `bootstrap_state`
# yet. The token is printed to the host pod's stdout — extract via
#   kubectl -n <ns> logs deploy/<release>-host | grep ax_bs_
# Once the wizard completes, all `/setup/*` paths return 410 (I11).
#
# `bootstrapToken` (optional, escape-hatch): pre-shared token that
# operators can bake into a Secret so they don't need to scrape stdout.
# When set, the plugin hashes this value and uses it as the bootstrap
# token; nothing is printed to stdout. Use this for canary deploys where
# stdout-grep is awkward.
#
# `publicBaseUrl` (optional): URL printed in the stdout banner so the
# operator knows where to point their browser. Defaults to
# http://<bind-host>:<port> which is rarely the externally-visible URL.
# Set this to the operator-facing URL (https://ax.example.com).
onboarding:
  bootstrapToken: ""    # AX_BOOTSTRAP_TOKEN
  publicBaseUrl: ""     # AX_PUBLIC_BASE_URL

# ─── Auth / better-auth ──────────────────────────────────────────
# Auth providers are DB-driven via @ax/auth-better. Provider rows live
# in the `auth_providers` table and are managed at runtime from the
# admin UI at `/admin/auth` (sign in → Settings → Auth providers).
# That UI persists changes through the providers CRUD endpoints
# (`/admin/auth/providers/*`) and hot-reloads them into the live auth
# handler without a kernel restart.
#
# First-run flow:
#   1. Operator installs the chart.
#   2. They scrape the bootstrap token from host pod stdout (or pre-
#      seed it via `onboarding.bootstrapToken` above).
#   3. They walk `/setup/*` (the @ax/onboarding wizard) to mint the
#      first admin user.
#   4. As the new admin, they open Settings → Auth providers and add
#      OIDC providers (Google, GitHub, generic).
#
# The legacy `auth.devBootstrap` and `auth.google` blocks were retired
# in Phase 3 (commit history: deploy/charts/ax-next/values.yaml). There
# is intentionally no operator-facing `auth:` config key here — providers
# live in the DB, and the one secret @ax/auth-better needs is generated
# for you (see below).
#
# `AX_AUTH_SECRET` (read by @ax/auth-better) is the stable secret used
# for OAuth state signing and at-rest OAuth-token encryption. You don't
# supply it — the chart generates 32 bytes of entropy at first install
# and stashes it in the `<release>-secrets` Secret under the `auth-secret`
# key. A `lookup` guard keeps it stable across `helm upgrade`, so we never
# regenerate it out from under you.
#
# Keep this one stable. If the secret changes, every OAuth token we
# already encrypted with the old value becomes undecryptable — users have
# to re-link their providers. We're paranoid about this for good reason.
#
# Need to supply or rename the secret yourself (e.g. your GitOps tooling
# provisions all secrets out-of-band)? The chart reads it via a
# `secretKeyRef` in `templates/host/deployment.yaml` — point that at your
# own Secret/key there. There's no `existingSecret` value for it; we'd
# rather you edit the one obvious spot than wire up an indirection that
# silently no-ops if you typo it.

# ─── Network policies ────────────────────────────────────────────
# `enabled: true` is the safe default. Disabling is supported only for
# kind-dev (where Calico/Cilium are not installed and policies are
# silently no-ops anyway).
networkPolicies:
  enabled: true

# ─── Ingress ─────────────────────────────────────────────────────
# Off by default — production deploys typically front the host with a
# cloud LB or a service mesh. Enable per-cluster.
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls: false
  tlsSecretName: ""

# ─── Skills / capability acquisition ─────────────────────────────
# JIT open mode (design decision #5 / §10). When true, the agent may
# author + install user-scoped skills on the fly. The per-skill
# host/credential approval card is the backstop — agents propose,
# a human grants. ON by default so skill-authoring works out of the
# box; set false to lock down to curated-catalog-only mode. The host
# pod reads this via AX_ALLOW_USER_INSTALLED_SKILLS; @ax/skill-broker
# holds the gate. (Curated mode — the broker proposing vetted catalog
# skills — is always on and unaffected by this flag.)
skills:
  allowUserInstalled: true

# ─── ax-next runtime config ──────────────────────────────────────
# This block is rendered into a ConfigMap and mounted at /etc/ax-next/.
# It tells the CLI which providers to use; the corresponding plugins
# are loaded by the @ax/preset-k8s preset.
config:
  preset: k8s
  models:
    default: ["claude-sonnet-4-5"]
  history:
    maxTurns: 50
