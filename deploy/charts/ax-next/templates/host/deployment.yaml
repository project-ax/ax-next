{{- include "ax-next.validateWorkspaceBackend" . -}}
{{- include "ax-next.validateHostReplicas" . -}}
{{- include "ax-next.validateBlobBackend" . -}}
{{- include "ax-next.validateProxyTransport" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ax-next.hostComponentName" . }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
    ax.io/plane: ingress
spec:
  # Single-replica only — enforced at render time by
  # ax-next.validateHostReplicas (template FAILS for replicas > 1). The web
  # chat surface's SSE chunk buffer is in-process; multi-replica needs a
  # distributed stream broker first (tracked follow-up).
  replicas: {{ .Values.replicas | default 1 }}
  strategy:
    type: Recreate   # PVC is RWO; we can't have two pods mounting at once.
  selector:
    matchLabels:
      {{- include "ax-next.selectorLabels" (dict "component" "host" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ax-next.selectorLabels" (dict "component" "host" "context" $) | nindent 8 }}
        ax.io/plane: ingress
      annotations:
        # Roll the pod when ax-next config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-ax-config.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/hook-secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "ax-next.hostComponentName" . }}
      terminationGracePeriodSeconds: {{ .Values.host.terminationGracePeriodSeconds | default 30 }}
      # The agent image runs as UID 1000 (see container/agent/Dockerfile's
      # `USER 1000:1000`). fsGroup makes mounted emptyDirs (notably
      # /var/run/ax for the credential-proxy unix socket) writable by that
      # user — without it, the proxy's `listen()` call fails with
      # `EACCES: permission denied /var/run/ax/proxy.sock` and the pod
      # crash-loops at boot.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.sandbox.proxySocketHostPath }}
      # When the credential-proxy lives on a hostPath (the kind / single-
      # node posture), the kubelet creates the dir owned by root:root —
      # the non-root host container then can't write the proxy socket OR
      # the MITM CA. fsGroup doesn't apply to hostPath, so we chown via
      # an init container that runs as root, sets ownership to the same
      # UID:GID the host container uses (1000:1000 from the agent
      # Dockerfile), and exits. The runner pod mounts the same dir
      # read-only, so chmod 0750 is enough — we don't need world reads.
      initContainers:
        - name: proxy-socket-chown
          image: {{ include "ax-next.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["sh", "-c"]
          args:
            - |
              chown -R 1000:1000 /var/run/ax && \
              chmod -R 0750 /var/run/ax
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              add: ["CHOWN", "FOWNER"]
              drop: ["ALL"]
          volumeMounts:
            - name: proxy-socket
              mountPath: /var/run/ax
      {{- end }}
      containers:
        - name: host
          image: {{ include "ax-next.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          args: {{ .Values.host.args | toJson }}
          ports:
            # @ax/ipc-http — runner-pod ↔ host back-channel (BIND_HOST/PORT).
            # NOT public traffic.
            - name: ipc
              containerPort: {{ .Values.host.ports.ipc }}
              protocol: TCP
            # @ax/http-server — public surface (AX_HTTP_HOST/PORT). Carries
            # /chat, /health, /admin/*, /auth/*, /api/chat/*. This is the
            # listener Ingress / port-forward should target.
            - name: public-http
              containerPort: {{ .Values.host.ports.publicHttp }}
              protocol: TCP
            {{- if .Values.credentialProxy.tcp.enabled }}
            # @ax/credential-proxy TCP listener (TASK-149, production gVisor).
            # The credential-proxy-service.yaml ClusterIP Service targets this
            # named port so runner pods reach the proxy over the cluster
            # network instead of a hostPath socket.
            - name: proxy
              containerPort: {{ .Values.credentialProxy.tcp.port | default 8888 }}
              protocol: TCP
            {{- end }}
          env:
            - name: AX_CONFIG_PATH
              value: "/etc/ax-next/ax.config.yaml"

            # @ax/ipc-http listener (runner-pod back-channel).
            - name: BIND_HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.host.ports.ipc | quote }}

            # @ax/http-server listener (public surface — issue #39).
            - name: AX_HTTP_HOST
              value: "0.0.0.0"
            - name: AX_HTTP_PORT
              value: {{ .Values.host.ports.publicHttp | quote }}
            - name: AX_HTTP_COOKIE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.fullname" . }}-secrets
                  key: http-cookie-key
            {{- if .Values.http.allowedOrigins }}
            - name: AX_HTTP_ALLOWED_ORIGINS
              value: {{ join "," .Values.http.allowedOrigins | quote }}
            {{- else }}
            # No allow-list set; suppress the http-server's loud warn so
            # operators who deliberately rely on the X-Requested-With
            # header for CSRF (kind / canary) don't get a wall of stderr.
            # Production deploys SHOULD set http.allowedOrigins.
            - name: AX_HTTP_ALLOW_NO_ORIGINS
              value: "1"
            {{- end }}

            # Auth providers are DB-driven via @ax/auth-better — the
            # operator walks /setup/* (Phase 2 onboarding wizard) once,
            # then adds providers from /admin/auth/providers/* at runtime.
            # No env vars stamp provider config onto the host pod anymore;
            # rows live in the `auth_providers` table and hot-reload on
            # change.

            # @ax/onboarding — first-run wizard env vars.
            # Both are optional; the plugin generates+prints a token at
            # first boot when neither is set.
            {{- if .Values.onboarding.bootstrapToken }}
            - name: AX_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.fullname" . }}-secrets
                  key: bootstrap-token
            {{- end }}
            {{- if .Values.onboarding.publicBaseUrl }}
            - name: AX_PUBLIC_BASE_URL
              value: {{ .Values.onboarding.publicBaseUrl | quote }}
            {{- end }}

            # channel-web SPA — when enabled, @ax/static-files serves the
            # bundle at /* (with SPA fallback). Disable via
            # --set channelWeb.enabled=false for headless / API-only deploys.
            #
            # `required`: an empty bundleDir would render value: "" and the
            # preset's `AX_STATIC_FILES_DIR` gate (set-and-non-empty) would
            # silently skip loading the static-files plugin — operator
            # explicitly enabled the SPA, fail loudly instead.
            {{- if .Values.channelWeb.enabled }}
            - name: AX_STATIC_FILES_DIR
              value: {{ required "channelWeb.bundleDir is required when channelWeb.enabled=true" .Values.channelWeb.bundleDir | quote }}
            {{- end }}

            # Sandbox plugin reads these to size + place runner pods.
            - name: K8S_RUNTIME_CLASS
              value: {{ .Values.sandbox.runtimeClassName | quote }}
            - name: K8S_NAMESPACE
              value: {{ include "ax-next.runnerNamespace" . | quote }}
            - name: K8S_POD_IMAGE
              value: {{ include "ax-next.image" . | quote }}
            {{- /* K8S_IMAGE_PULL_POLICY: removed in issue #39 — no plugin
                  reads it. The runner pod's pull policy is the cluster's
                  default; operators wanting an override should patch the
                  sandbox-k8s pod template instead. */}}
            {{- if .Values.imagePullSecrets }}
            - name: K8S_IMAGE_PULL_SECRETS
              value: {{ join "," .Values.imagePullSecrets | quote }}
            {{- end }}
            {{- if .Values.sandbox.proxySocketHostPath }}
            # Tells @ax/sandbox-k8s to (a) mount this hostPath at
            # /var/run/ax in every runner pod and (b) stamp the matching
            # AX_PROXY_UNIX_SOCKET / NODE_EXTRA_CA_CERTS / SSL_CERT_FILE
            # env so the runner can dial the host pod's credential-proxy
            # and trust its MITM certs. Mirrors the host-side mount above.
            - name: K8S_PROXY_SOCKET_HOST_PATH
              value: {{ .Values.sandbox.proxySocketHostPath | quote }}
            # Pin the credential-proxy's CA dir into the SAME shared dir
            # so `ca.crt` lands at the path the runner is told to read
            # (`/var/run/ax/proxy-ca/ca.crt`). Without this, the host
            # writes the cert to ~/.ax/proxy-ca/ inside the host pod's
            # private filesystem and the runner can't reach it.
            - name: AX_PROXY_CA_DIR
              value: "/var/run/ax/proxy-ca"
            {{- else if .Values.credentialProxy.tcp.enabled }}
            # TASK-149 — TCP-Service proxy posture (production gVisor). The
            # credential-proxy listens on a TCP port (AX_PROXY_TCP_PORT) and
            # advertises the cluster Service URL (AX_PROXY_ADVERTISED_ENDPOINT)
            # so runner pods get a dialable address. The sandbox plugin stamps
            # the SAME Service URL on each runner as the proxy endpoint
            # (K8S_PROXY_ENDPOINT) and delivers the MITM CA via AX_PROXY_CA_PEM
            # — NO hostPath mount. Mutually exclusive with the hostPath block
            # above (validateProxyTransport rejects both).
            - name: AX_PROXY_TCP_PORT
              value: {{ .Values.credentialProxy.tcp.port | default 8888 | quote }}
            - name: AX_PROXY_ADVERTISED_ENDPOINT
              value: {{ include "ax-next.credentialProxyAdvertisedEndpoint" . | quote }}
            - name: K8S_PROXY_ENDPOINT
              value: {{ include "ax-next.credentialProxyServiceUrl" . | quote }}
            {{- end }}

            # Cluster-internal URL runner pods use to reach our IPC listener
            # (@ax/ipc-http). @ax/sandbox-k8s reads this and stamps it onto
            # every runner pod's AX_RUNNER_ENDPOINT env var.
            - name: AX_K8S_HOST_IPC_URL
              value: {{ include "ax-next.hostIpcUrl" . | quote }}

            {{- if eq .Values.workspace.backend "local" }}
            # Workspace dir lives on the host pod's PVC.
            - name: AX_WORKSPACE_ROOT
              value: {{ .Values.workspace.mountPath | quote }}
            # Skill bundle byte-store (JIT git-tree backing). A bare git repo
            # under the host PVC, sibling to workspace-git's repo.git. Single-
            # replica posture; multi-replica catalog durability is deferred
            # (ARCH-9), same split as workspace-git local vs -server.
            - name: AX_SKILLS_BUNDLE_ROOT
              value: {{ printf "%s/skill-bundles" .Values.workspace.mountPath | quote }}
            {{- end }}

            # Workspace backend selection. The host's plugin loader reads
            # AX_WORKSPACE_BACKEND and registers the matching plugin
            # (@ax/workspace-git for `local`, @ax/workspace-git-server for
            # `git-protocol`).
            - name: AX_WORKSPACE_BACKEND
              value: {{ .Values.workspace.backend | quote }}
            {{- if eq .Values.workspace.backend "git-protocol" }}
            # Host's `@ax/workspace-git-server` plugin talks smart-HTTP +
            # REST to the dedicated git-server StatefulSet via its
            # ClusterIP Service.
            - name: AX_WORKSPACE_GIT_SERVER_URL
              value: {{ include "ax-next.gitServerExperimentalServiceUrl" . | quote }}
            - name: AX_WORKSPACE_GIT_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.gitServerAuthSecretName" . }}
                  key: token
            {{- end }}

            # Blob backend selection (out-of-git design Part A). The preset's
            # loader (blobConfigFromEnv) reads AX_BLOB_BACKEND + the per-backend
            # vars and registers exactly one of @ax/blob-store-fs /
            # @ax/blob-store-s3.
            - name: AX_BLOB_BACKEND
              value: {{ .Values.blob.backend | quote }}
            {{- if eq .Values.blob.backend "fs" }}
            {{- if .Values.blob.fs.root }}
            # Explicit fs root. Empty → the preset derives <workspace
            # mountPath>/blobs (a sibling dir on the host PVC), so we only
            # stamp this when the operator overrode it.
            - name: AX_BLOB_FS_ROOT
              value: {{ .Values.blob.fs.root | quote }}
            {{- end }}
            {{- else if eq .Values.blob.backend "s3" }}
            # S3-compatible blob backend. In the kind/dev path minio.enabled
            # provides the bucket + endpoint + (dev-only) static keys from the
            # MinIO Secret. In prod (GCS), blob.s3.* is set explicitly and the
            # static keys are OMITTED so the SDK uses Workload Identity — NO
            # static keys in the tree.
            - name: AX_BLOB_S3_BUCKET
              value: {{ (.Values.minio.enabled | ternary .Values.minio.bucket .Values.blob.s3.bucket) | quote }}
            - name: AX_BLOB_S3_ENDPOINT
              value: {{ (.Values.minio.enabled | ternary (include "ax-next.minioEndpointUrl" .) .Values.blob.s3.endpoint) | quote }}
            - name: AX_BLOB_S3_REGION
              value: {{ .Values.blob.s3.region | quote }}
            - name: AX_BLOB_S3_FORCE_PATH_STYLE
              value: {{ .Values.blob.s3.forcePathStyle | quote }}
            {{- if .Values.blob.s3.keyPrefix }}
            - name: AX_BLOB_S3_KEY_PREFIX
              value: {{ .Values.blob.s3.keyPrefix | quote }}
            {{- end }}
            {{- if .Values.minio.enabled }}
            # DEV / MinIO static keys from the generated Secret — never
            # committed. Prod (GCS) leaves these UNSET (Workload Identity).
            - name: AX_BLOB_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.minioAuthSecretName" . }}
                  key: root-user
            - name: AX_BLOB_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.minioAuthSecretName" . }}
                  key: root-password
            {{- end }}
            {{- end }}

            # Credentials key — encrypts secrets at rest. Required.
            - name: AX_CREDENTIALS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.fullname" . }}-secrets
                  key: credentials-key

            # better-auth secret — stable secret for OAuth state and at-rest
            # OAuth-token encryption. Auto-generated at first install and
            # never rotated by helm upgrade (lookup-stable in hook-secret.yaml).
            # A rotation makes every existing encrypted OAuth token undecryptable.
            - name: AX_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.fullname" . }}-secrets
                  key: auth-secret

            # Conditionally mount /admin/credentials* + /settings/credentials*
            # by loading @ax/credentials-admin-routes. Off by default; the
            # preset reads this env var (loadK8sConfigFromEnv) and only loads
            # the plugin when it's literally 'true'.
            {{- if .Values.credentials.admin.enabled }}
            - name: AX_CREDENTIALS_ADMIN_ENABLED
              value: "true"
            {{- end }}

            # Built-in skill-creator gate. When set, the orchestrator's
            # loadBuiltinSkills() ships the ax-skill-creator starter skill so
            # agents get authoring capability out of the box. Self-authored draft
            # discovery (agents:resolve-authored-skills) is UNCONDITIONAL — it is
            # gated only by the read-only host projection + the Phase-2 quarantine
            # scan, NOT by this flag. Set skills.allowUserInstalled=false to omit
            # the starter skill (curated mode); discovery still runs.
            {{- if .Values.skills.allowUserInstalled }}
            - name: AX_ALLOW_USER_INSTALLED_SKILLS
              value: "true"
            {{- end }}

            # Anthropic API key — optional. The first-run wizard collects
            # one and stores it in the credentials table; this env-var is
            # only the bottom-of-precedence fallback (and the gate that
            # enables auto-titling on the host pod). When unset, the
            # preset's loadK8sConfigFromEnv simply omits cfg.titles.
            {{- $existingHostSecret := lookup "v1" "Secret" (include "ax-next.hostNamespace" .) (printf "%s-secrets" (include "ax-next.fullname" .)) }}
            {{- if or .Values.anthropic.apiKey (and $existingHostSecret $existingHostSecret.data (index $existingHostSecret.data "anthropic-api-key")) }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax-next.fullname" . }}-secrets
                  key: anthropic-api-key

            # Auto-title model. Only effective when ANTHROPIC_API_KEY
            # (above) is set — see presets/k8s/src/index.ts loader.
            - name: AX_TITLE_MODEL
              value: {{ .Values.titles.model | quote }}
            {{- end }}

            # Database URL — sourced from external secret OR built from
            # the embedded subchart's secret.
            {{- if .Values.postgres.external.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.existingSecret | required "postgres.external.existingSecret is required when postgres.external.enabled=true" }}
                  key: {{ .Values.postgres.external.secretKey | default "url" }}
            {{- else }}
            {{- $pgUser := .Values.postgresql.auth.username | default "ax_next" }}
            {{- $pgDb := .Values.postgresql.auth.database | default "ax_next" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ $pgUser }}:$(PGPASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ $pgDb }}"
            {{- end }}

            {{- with .Values.host.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.host.resources | nindent 12 }}
          {{- with .Values.host.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.host.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ax-config
              mountPath: /etc/ax-next
              readOnly: true
            # @ax/credential-proxy listens on a unix socket inside this dir
            # (default `/var/run/ax/proxy.sock`). Must be writable by the
            # container's UID — securityContext.fsGroup above handles that.
            - name: proxy-socket
              mountPath: /var/run/ax
            {{- if eq .Values.workspace.backend "local" }}
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            {{- end }}
      volumes:
        - name: ax-config
          configMap:
            name: {{ include "ax-next.fullname" . }}-config
        # The credential-proxy's Unix socket (and MITM CA cert) live in
        # this dir. When `sandbox.proxySocketHostPath` is set, the runner
        # pods get a SAME hostPath mount at the same in-pod mountpoint
        # — that's what makes the socket reachable cross-pod. Without
        # it (the legacy posture), the dir is an emptyDir scoped to the
        # host pod and runner pods can't reach the proxy.
        #
        # SECURITY: hostPath is single-node-only and lets a pod that
        # mounts it write to the node filesystem. We use it here because
        # cross-pod Unix sockets have no good alternative on a single
        # kind node; production should switch the credential-proxy to
        # TCP listen mode + Service so the Unix socket disappears.
        - name: proxy-socket
        {{- if .Values.sandbox.proxySocketHostPath }}
          hostPath:
            path: {{ .Values.sandbox.proxySocketHostPath | quote }}
            type: DirectoryOrCreate
        {{- else }}
          # Ephemeral; emptyDir gets its group ownership from fsGroup
          # above (1000), so the proxy can bind() the socket as UID 1000.
          emptyDir: {}
        {{- end }}
        {{- if eq .Values.workspace.backend "local" }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "ax-next.fullname" . }}-workspace
        {{- end }}
