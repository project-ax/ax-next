apiVersion: v1
kind: Service
metadata:
  name: {{ include "ax-next.hostComponentName" . }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ax-next.selectorLabels" (dict "component" "host" "context" $) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.host.ipcServicePort | default 80 }}
      targetPort: http
      protocol: TCP
