{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ax-next.hostComponentName" . }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- if .Values.ingress.tlsSecretName }}
      secretName: {{ .Values.ingress.tlsSecretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ax-next.hostComponentName" . }}
                port:
                  # Must match a named port on the host Service (service.yaml).
                  # That Service exposes `ipc` (runner back-channel, :80) and
                  # `public-http` (the public surface — /chat, /setup, /health,
                  # /admin/*, /auth/*). Ingress MUST target `public-http`; a
                  # value of `http` matches no port and the LB never wires a
                  # backend (silent 404/502). See render.test.ts ingress guard.
                  name: public-http
{{- end }}
