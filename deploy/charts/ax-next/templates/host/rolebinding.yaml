apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ax-next.fullname" . }}-host-runner-manager
  namespace: {{ include "ax-next.runnerNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ax-next.fullname" . }}-host
    namespace: {{ include "ax-next.hostNamespace" . }}
roleRef:
  kind: Role
  name: {{ include "ax-next.fullname" . }}-runner-manager
  apiGroup: rbac.authorization.k8s.io
