apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ax-next.fullname" . }}-host
  namespace: {{ include "ax-next.hostNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
# The host pod's k8s identity. The Role bound to this SA grants the
# minimum verbs needed to spawn/teardown runner pods in
# .Values.namespace.runner — see role.yaml in this directory.
