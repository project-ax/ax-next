{{- if .Values.gitServer.enabled }}
{{/*
Bearer token Secret for the git-server pod.

The host pod (workspace-git-http client) and the git-server pod read this
same Secret — the host stamps it onto its outbound Authorization header,
the server constant-time compares it on every request.

Resolution order:
  1. operator override via .Values.gitServer.auth.token (e.g., GitOps
     wants a deterministic token)
  2. existing Secret in the cluster — preserve its token across upgrades
     so we don't lock the host out of an in-flight session by rotating
     under it
  3. fresh randAlphaNum(48) — install-time generation

`lookup` returns nil during `helm template` / `--dry-run`, so offline
rendering falls through to a fresh randAlphaNum each render. That's fine
for rendering checks; it just means the rendered token won't match what
ends up in the cluster.

resource-policy: keep mirrors the host secrets pattern — `helm uninstall`
leaves this Secret behind so a reinstall doesn't accidentally rotate the
token under a still-running host pod.
*/}}
{{- $existing := lookup "v1" "Secret" (include "ax-next.hostNamespace" .) (include "ax-next.gitServerAuthSecretName" .) -}}
{{- $token := "" -}}
{{- if .Values.gitServer.auth.token -}}
  {{- $token = .Values.gitServer.auth.token -}}
{{- else if and $existing $existing.data (index $existing.data "token") -}}
  {{- $token = (index $existing.data "token") | b64dec -}}
{{- else -}}
  {{- $token = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ax-next.gitServerAuthSecretName" . }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "ax-next.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
{{- end }}
