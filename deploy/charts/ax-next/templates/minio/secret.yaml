{{- if .Values.minio.enabled }}
{{/*
MinIO root credentials (out-of-git design Part A — dev/test blob backend).

DEV / kind ONLY. These are the MinIO root user + password, used by BOTH the
MinIO server (as MINIO_ROOT_USER / MINIO_ROOT_PASSWORD) and the host's
@ax/blob-store-s3 client (as AX_BLOB_S3_ACCESS_KEY_ID / _SECRET_ACCESS_KEY).
Production uses GCS + Workload Identity instead — minio.enabled=false — so no
static S3 keys exist in that path at all.

Never committed: the values default for the password is empty; we generate a
random 24-byte password here. Lookup-stable like the host secrets — an upgrade
that re-renders this template reuses the existing password verbatim rather than
rotating it out from under a running MinIO (which would lock the host client out
of its own bucket). `lookup` returns nil during `helm template` / `--dry-run`,
so offline renders fall to the else branch and produce a deterministic-shape
(but ephemeral) value — fine, because nothing persists from a dry run.
*/}}
{{- $secretName := include "ax-next.minioAuthSecretName" . }}
{{- $existing := lookup "v1" "Secret" (include "ax-next.hostNamespace" .) $secretName }}
{{- $rootUser := .Values.minio.auth.rootUser | default "ax-minio" }}
{{- $rootPassword := "" }}
{{- if and $existing $existing.data (index $existing.data "root-password") }}
  {{- $rootPassword = index $existing.data "root-password" }}
{{- else if .Values.minio.auth.rootPassword }}
  {{- $rootPassword = .Values.minio.auth.rootPassword | b64enc }}
{{- else }}
  {{- $rootPassword = randAlphaNum 24 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "minio" "context" $) | nindent 4 }}
type: Opaque
data:
  root-user: {{ $rootUser | b64enc }}
  root-password: {{ $rootPassword }}
{{- end }}
