{{- if .Values.credentialProxy.tcp.enabled }}
{{- include "ax-next.validateProxyTransport" . -}}
{{/*
Credential-proxy TCP Service (TASK-149 — production gVisor).

GKE Sandbox bans hostPath, so the kind-only Unix-socket-over-hostPath posture
can't run there. In TCP mode the credential-proxy listens on a TCP port inside
the host pod; this ClusterIP Service fronts it so runner pods (label
`ax.io/plane: execution`, in the runner namespace) reach it over the cluster
network. The MITM CA travels to each runner as an env var instead of a mount.

The Service SELECTS THE HOST POD — the proxy runs inside the host container, so
this is a second Service on the same pod (alongside the IPC + public-http
Services). NetworkPolicy (sandbox-restrict) opens the runner→proxy egress hole;
this is the chokepoint, not the internet.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ax-next.credentialProxyComponentName" . }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
    ax.io/service: credential-proxy
spec:
  type: ClusterIP
  selector:
    {{- include "ax-next.selectorLabels" (dict "component" "host" "context" $) | nindent 4 }}
  ports:
    - name: proxy
      port: {{ .Values.credentialProxy.tcp.port | default 8888 }}
      targetPort: proxy
      protocol: TCP
{{- end }}
