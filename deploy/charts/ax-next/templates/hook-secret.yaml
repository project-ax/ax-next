{{/*
Host pod secrets. Today this carries:
  - AX_CREDENTIALS_KEY (32-byte base64) — encrypts secrets at rest. See
    packages/credentials/SECURITY.md for the format.
  - ANTHROPIC_API_KEY — required to call the Anthropic API.

Both are operator-provided at install:
  --set credentials.key=$(openssl rand -base64 32)
  --set anthropic.apiKey=$ANTHROPIC_API_KEY

We DO NOT default these. `required` makes `helm install` fail loudly if
either is missing.

`resource-policy: keep` — `helm uninstall` does NOT delete this Secret,
so a reinstall picks up the same `AX_CREDENTIALS_KEY` and previously-
encrypted credentials still decrypt. Operators who want a fresh start
delete the Secret manually.

Why the `lookup` dance below — and yes, we know it looks paranoid:
On `helm upgrade`, this template re-renders from `.Values.credentials.key`
and would otherwise overwrite the existing Secret's `credentials-key`
data. The install instructions tell operators to generate the key with
`openssl rand -base64 32`, so it is REALLY easy to re-run that on every
upgrade and silently brick every credential we encrypted with the old
key (see packages/credentials/SECURITY.md — losing the key means the
ciphertext is gone forever).

So: if the Secret already exists with a `credentials-key`, we keep that
value verbatim and ignore whatever the operator passed. New installs
still hit `required` via the else branch. `lookup` returns nil during
`helm template` / `--dry-run`, which means those modes also fall to the
else branch — exactly what we want for offline rendering.

Operators who genuinely need to rotate the key have to do it
deliberately (re-encrypt every credential with the new key, then update
the Secret). We do not let `helm upgrade` do it accidentally.
*/}}
{{- $secretName := printf "%s-secrets" (include "ax-next.fullname" .) }}
{{- $existing := lookup "v1" "Secret" (include "ax-next.hostNamespace" .) $secretName }}

{{/*
credentials-key (encrypts secrets at rest). Lookup-stable: if the Secret
already exists, reuse the value verbatim — rotating the key destroys
every encrypted credential we have.
*/}}
{{- $credentialsKey := "" }}
{{- if and $existing $existing.data (index $existing.data "credentials-key") }}
  {{- $credentialsKey = index $existing.data "credentials-key" }}
{{- else }}
  {{- $credentialsKey = required "credentials.key is required (generate with: openssl rand -base64 32)" .Values.credentials.key | b64enc }}
{{- end }}

{{/*
http-cookie-key (signs auth-better session cookies). Lookup-stable for the
same reason as credentials-key — rotating it invalidates every active
session cookie. 32 bytes, 64 hex chars or 44 base64 chars; the
@ax/http-server's parser accepts either.
*/}}
{{- $httpCookieKey := "" }}
{{- if and $existing $existing.data (index $existing.data "http-cookie-key") }}
  {{- $httpCookieKey = index $existing.data "http-cookie-key" }}
{{- else }}
  {{- $httpCookieKey = required "http.cookieKey is required (generate with: openssl rand -hex 32)" .Values.http.cookieKey | b64enc }}
{{- end }}

{{/*
auth-secret (stable secret for better-auth OAuth state + at-rest
OAuth-token encryption). Auto-generated at first install; lookup-stable
so an upgrade never regenerates it — a rotated secret makes every
existing encrypted OAuth token undecryptable.

32 bytes of entropy, base64-encoded (44 chars). Operators who need to
rotate deliberately can delete the Secret key and re-install.
*/}}
{{- $authSecret := "" }}
{{- if and $existing $existing.data (index $existing.data "auth-secret") }}
  {{- $authSecret = index $existing.data "auth-secret" }}
{{- else }}
  {{- $authSecret = randBytes 32 | b64enc }}
{{- end }}

{{/*
bootstrap-token (first-run wizard pre-shared override). Lookup-stable —
once set, an upgrade that doesn't re-pass the value keeps the existing
token. Only rendered when onboarding.bootstrapToken is in play.
*/}}
{{- $useBootstrapToken := or .Values.onboarding.bootstrapToken (and $existing $existing.data (index $existing.data "bootstrap-token")) }}
{{- $bootstrapToken := "" }}
{{- if $useBootstrapToken }}
  {{- if and $existing $existing.data (index $existing.data "bootstrap-token") }}
    {{- $bootstrapToken = index $existing.data "bootstrap-token" }}
  {{- else }}
    {{- $bootstrapToken = required "onboarding.bootstrapToken must be non-empty when set" .Values.onboarding.bootstrapToken | b64enc }}
  {{- end }}
{{- end }}

{{/*
anthropic-api-key — historically required, now optional. The first-run
onboarding wizard collects an API key and stores it in the credentials
table; the chat orchestrator reads from there. The env-var path is the
bottom-of-precedence fallback (multi-tenant deploys without a shared
host key skip it entirely).

Lookup-stable: an upgrade that doesn't re-pass the value keeps the
existing key (so an operator who set it once doesn't need to keep it
in their `helm upgrade` command). Only rendered when set.
*/}}
{{- $useAnthropic := or .Values.anthropic.apiKey (and $existing $existing.data (index $existing.data "anthropic-api-key")) }}
{{- $anthropicApiKey := "" }}
{{- if $useAnthropic }}
  {{- if and $existing $existing.data (index $existing.data "anthropic-api-key") }}
    {{- $anthropicApiKey = index $existing.data "anthropic-api-key" }}
  {{- else }}
    {{- $anthropicApiKey = .Values.anthropic.apiKey | b64enc }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "ax-next.labels" . | nindent 4 }}
type: Opaque
data:
  credentials-key: {{ $credentialsKey }}
  http-cookie-key: {{ $httpCookieKey }}
  auth-secret: {{ $authSecret }}
  {{- if $useAnthropic }}
  anthropic-api-key: {{ $anthropicApiKey }}
  {{- end }}
  {{- if $useBootstrapToken }}
  bootstrap-token: {{ $bootstrapToken }}
  {{- end }}
