{{/*
Host pod secrets. Today this carries:
  - AX_CREDENTIALS_KEY (32-byte base64) — encrypts secrets at rest. See
    packages/credentials/SECURITY.md for the format.
  - ANTHROPIC_API_KEY — required to call the Anthropic API.

Both are operator-provided at install:
  --set credentials.key=$(openssl rand -base64 32)
  --set anthropic.apiKey=$ANTHROPIC_API_KEY

We DO NOT default these. `required` makes `helm install` fail loudly if
either is missing.

`resource-policy: keep` — `helm uninstall` does NOT delete this Secret,
so a reinstall picks up the same `AX_CREDENTIALS_KEY` and previously-
encrypted credentials still decrypt. Operators who want a fresh start
delete the Secret manually.

Why the `lookup` dance below — and yes, we know it looks paranoid:
On `helm upgrade`, this template re-renders from `.Values.credentials.key`
and would otherwise overwrite the existing Secret's `credentials-key`
data. The install instructions tell operators to generate the key with
`openssl rand -base64 32`, so it is REALLY easy to re-run that on every
upgrade and silently brick every credential we encrypted with the old
key (see packages/credentials/SECURITY.md — losing the key means the
ciphertext is gone forever).

So: if the Secret already exists with a `credentials-key`, we keep that
value verbatim and ignore whatever the operator passed. New installs
still hit `required` via the else branch. `lookup` returns nil during
`helm template` / `--dry-run`, which means those modes also fall to the
else branch — exactly what we want for offline rendering.

Operators who genuinely need to rotate the key have to do it
deliberately (re-encrypt every credential with the new key, then update
the Secret). We do not let `helm upgrade` do it accidentally.
*/}}
{{- $secretName := printf "%s-secrets" (include "ax-next.fullname" .) }}
{{- $existing := lookup "v1" "Secret" (include "ax-next.hostNamespace" .) $secretName }}
{{- $key := "" }}
{{- if and $existing $existing.data (index $existing.data "credentials-key") }}
  {{- $key = index $existing.data "credentials-key" }}
{{- else }}
  {{- $key = required "credentials.key is required (generate with: openssl rand -base64 32)" .Values.credentials.key | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "ax-next.labels" . | nindent 4 }}
type: Opaque
data:
  credentials-key: {{ $key }}
  anthropic-api-key: {{ required "anthropic.apiKey is required (set via --set anthropic.apiKey=$ANTHROPIC_API_KEY)" .Values.anthropic.apiKey | b64enc }}
