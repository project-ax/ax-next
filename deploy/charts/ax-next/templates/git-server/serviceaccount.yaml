{{- if .Values.gitServer.enabled }}
{{/*
Empty ServiceAccount for the git-server pod. The pod has no business
talking to the k8s API — no Role binding, no token mount needed beyond
the default. We declare the SA explicitly so we own the identity rather
than borrowing the namespace `default` SA (which often has surprise
RoleBindings in real clusters).
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ax-next.gitServerComponentName" . }}
  namespace: {{ include "ax-next.hostNamespace" . }}
  labels:
    {{- include "ax-next.componentLabels" (dict "component" "git-server" "context" $) | nindent 4 }}
{{- end }}
